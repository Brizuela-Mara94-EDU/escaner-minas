<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Visor 3D</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial;
            background-color: #000;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        }

        .header-logo {
            height: 60px;
            width: auto;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .close-btn:hover {
            background: rgba(21, 59, 130, 0.3);
        }

        .model-info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(21, 59, 130, 0.5);
            border-radius: 10px;
            padding: 16px 28px;
            z-index: 30;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .model-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .model-subtitle {
            font-size: 12px;
            color: #4A90E2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .zoom-controls {
            position: fixed;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(21, 59, 130, 0.4);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(10px);
        }

        .zoom-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .zoom-btn:active {
            transform: scale(0.95);
        }

        .rotation-controls {
            position: fixed;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(3, 44px);
            grid-template-rows: repeat(3, 44px);
            gap: 8px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(21, 59, 130, 0.4);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(10px);
        }

        .rotation-btn {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .rotation-btn:active {
            background: rgba(21, 59, 130, 0.5);
            transform: scale(0.95);
        }

        #rotateUp {
            grid-column: 2;
            grid-row: 1;
        }

        #rotateLeft {
            grid-column: 1;
            grid-row: 2;
        }

        #rotateReset {
            grid-column: 2;
            grid-row: 2;
            font-size: 24px;
        }

        #rotateRight {
            grid-column: 3;
            grid-row: 2;
        }

        #rotateDown {
            grid-column: 2;
            grid-row: 3;
        }

        .mobile-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(21, 59, 130, 0.4);
            border-radius: 8px;
            padding: 10px 20px;
            z-index: 20;
            text-align: center;
            color: #fff;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header-logo {
                height: 40px;
            }

            .zoom-controls,
            .rotation-controls {
                display: none;
            }

            .model-info {
                top: auto;
                bottom: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="./assets/logo sied horizontal-02-BF-xqR4y.png" class="header-logo" alt="SIED Logo">
        <button class="close-btn" id="closeBtn" title="Cerrar">✕</button>
    </div>

    <div class="model-info" id="modelInfo">
        <div class="model-name" id="modelName">Maquinaria</div>
        <div class="model-subtitle">Visor 3D</div>
    </div>

    <div class="mobile-hint" id="mobileHint">
        <div style="font-size: 11px; opacity: 0.8; margin-bottom: 4px;">CONTROLES:</div>
        <div style="font-size: 12px;">🖐️ 1 dedo: Rotar | 🤏 2 dedos: Zoom</div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn">+</button>
        <button class="zoom-btn" id="zoomOut">−</button>
    </div>

    <div class="rotation-controls">
        <button class="rotation-btn" id="rotateUp">↑</button>
        <button class="rotation-btn" id="rotateLeft">←</button>
        <button class="rotation-btn" id="rotateReset">⟲</button>
        <button class="rotation-btn" id="rotateRight">→</button>
        <button class="rotation-btn" id="rotateDown">↓</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" background="color: #111">
        <a-assets id="assets-container"></a-assets>

        <!-- Modelo Principal -->
        <a-entity id="modelEntity" gltf-model="./models/lamp.glb" position="0 0 -4" scale="0.5 0.5 0.5"></a-entity>

        <a-camera position="0 1.6 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        <a-light type="ambient" color="#fff" intensity="1"></a-light>
        <a-light type="directional" color="#fff" intensity="0.5" position="-1 2 1"></a-light>
    </a-scene>

    <script>
        // 1. Botón cerrar
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.history.back();
        });

        // 2. Parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const markerParam = urlParams.get('marker');
        const nameParam = urlParams.get('name');

        if (nameParam) {
            document.getElementById('modelName').textContent = nameParam;
        }

        // 3. Ocultar hint de móvil en desktop
        const isMobile = ('ontouchstart' in window) && window.innerWidth <= 1024;
        const mobileHint = document.getElementById('mobileHint');
        if (!isMobile) {
            mobileHint.style.display = 'none';
        } else {
            setTimeout(() => {
                mobileHint.style.opacity = '0';
                mobileHint.style.transition = 'opacity 1s';
                setTimeout(() => mobileHint.style.display = 'none', 1000);
            }, 5000);
        }

        // 4. Configurar modelo según el marker
        const markerMap = {
            'casco': 'lamp',
            'pico': 'pico',
            'camion': 'truck',
            'tunel': 'tunel',
            'garras': 'garras',
            'perforadora': 'perforadora',
            'carga': 'carga',
            'oro': 'oro',
            'wolframita': 'wolframita',
            'truck': 'truck',
            'renderamarillo': 'renderamarillo'
        };

        let modelFile = "lamp"; // fallback
        if (markerParam) {
            modelFile = markerMap[markerParam] || markerParam;
        }

        const modelEntity = document.getElementById('modelEntity');
        modelEntity.setAttribute('gltf-model', `./models/${modelFile}.glb`);

        // Configuraciones iniciales (escala, pos, rot) ajustadas para modo Visor (más central y más grande)
        const modelConfig = {
            'lamp': { scale: 0.8, position: '0 1.2 -3', rotation: '0 -45 0' },
            'pico': { scale: 0.4, position: '0 1.6 -2', rotation: '0 90 0' },
            'truck': { scale: 2.0, position: '0 0.5 -4', rotation: '0 -90 0' },
            'tunel': { scale: 0.25, position: '0 1.0 -2', rotation: '0 90 0' },
            'garras': { scale: 1.2, position: '0 0.8 -3', rotation: '0 -90 0' },
            'perforadora': { scale: 2.2, position: '0 1.4 -4', rotation: '0 180 0' },
            'carga': { scale: 1.2, position: '0 0.8 -3', rotation: '0 -90 0' },
            'oro': { scale: 0.01, position: '0 1.4 -2.5', rotation: '0 0 0' },
            'wolframita': { scale: 2.0, position: '0 1.2 -6', rotation: '0 0 0' },
            'renderamarillo': { scale: 0.25, position: '0 1.0 -2', rotation: '0 -90 0' }
        };

        let currentScale = 0.5;
        let currentRotation = { x: 0, y: 0, z: 0 };
        let initialConfig = { scale: 0.8, position: '0 1.2 -3', rotation: '0 -45 0' };

        if (modelConfig[modelFile]) {
            initialConfig = modelConfig[modelFile];
        }

        currentScale = initialConfig.scale;
        const rotParts = initialConfig.rotation.split(' ').map(Number);
        currentRotation = { x: rotParts[0], y: rotParts[1], z: rotParts[2] };

        modelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        modelEntity.setAttribute('position', initialConfig.position);
        modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);

        // 5. Controles de Zoom y Rotación (Desktop)
        document.getElementById('zoomIn').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.1, 5.0);
            modelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.1, 0.01);
            modelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        });

        document.getElementById('rotateUp').addEventListener('click', () => {
            currentRotation.x += 15;
            modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });

        document.getElementById('rotateDown').addEventListener('click', () => {
            currentRotation.x -= 15;
            modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });

        document.getElementById('rotateLeft').addEventListener('click', () => {
            currentRotation.y += 15;
            modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });

        document.getElementById('rotateRight').addEventListener('click', () => {
            currentRotation.y -= 15;
            modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });

        document.getElementById('rotateReset').addEventListener('click', () => {
            currentScale = initialConfig.scale;
            const rP = initialConfig.rotation.split(' ').map(Number);
            currentRotation = { x: rP[0], y: rP[1], z: rP[2] };
            modelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
            modelEntity.setAttribute('position', initialConfig.position);
        });

        // 6. Controles Touch (Mobile)
        const scene = document.querySelector('a-scene');
        let touchStartDist = 0;
        let touchStartScale = currentScale;
        let touchStartRotY = 0;
        let lastTouchY = 0;

        scene.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].pageX - e.touches[1].pageX;
                const dy = e.touches[0].pageY - e.touches[1].pageY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
                touchStartScale = currentScale;
            } else if (e.touches.length === 1) {
                touchStartRotY = currentRotation.y;
                lastTouchY = e.touches[0].pageY;
            }
        });

        scene.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Evitar scroll

            if (e.touches.length === 2) {
                const dx = e.touches[0].pageX - e.touches[1].pageX;
                const dy = e.touches[0].pageY - e.touches[1].pageY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const scaleFactor = dist / touchStartDist;
                currentScale = Math.max(0.01, Math.min(5.0, touchStartScale * scaleFactor));
                modelEntity.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            } else if (e.touches.length === 1) {
                const deltaX = e.touches[0].pageX - window.innerWidth / 2;
                currentRotation.y = touchStartRotY + (deltaX * 0.5);

                const deltaY = e.touches[0].pageY - lastTouchY;
                currentRotation.x -= deltaY * 0.5;
                lastTouchY = e.touches[0].pageY;

                modelEntity.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
            }
        });

    </script>
</body>

</html>
