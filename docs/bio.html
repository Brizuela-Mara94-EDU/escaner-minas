<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIED - Biología Inicio</title>
    <link rel="icon" type="image/png" href="/AppMindAr/assets/LOGO%20SIED%20SOLO-01-BluIfg0u.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* ✅ CORRECCIÓN FONDO: Oscurecí el gradiente para que el texto blanco se lea perfecto sobre el bosque */
            background: linear-gradient(rgba(5, 20, 5, 0.75), rgba(0, 10, 0, 0.9)), url("./assets/bosque.jpg") no-repeat center center/cover;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Contenedor principal */
        #home {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 140px; 
            overflow: visible;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 140px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            z-index: 100;
        }

        /* ✅ SOLO LOGO SIED */
        .header-logo {
            max-height: 90px; /* Un poco más grande para compensar que está solo */
            width: auto;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        /* Barra lateral VERDE */
        .color-backdrop {
            position: absolute;
            right: 28%;
            top: 0;
            width: 28%;
            height: 100%;
            background: #779B2C; /* VERDE BIO */
            z-index: 1;
            filter: brightness(1.1);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.1s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Imagen principal (Mariposa) */
        .machine-image {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 65%;
            max-width: 900px;
            height: auto;
            z-index: 2;
            filter: drop-shadow(-10px 20px 50px rgba(0, 20, 0, 0.6));
            margin-right: 60px;
            opacity: 0;
            animation: fadeInSlide 1.2s ease-out 0.3s forwards;
        }

        /* NOTA: Si tu imagen mariposa.png tiene fondo blanco (como en la captura),
           necesitas una imagen PNG transparente. Si no la tienes, avísame. */

        @keyframes fadeInSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(100px);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
                filter: blur(0px);
            }
        }
        
        /* Contenido principal */
        .hero-content {
            max-width: 550px;
            z-index: 4;
            position: relative;
            margin-left: 80px; 
        }

        .hero-subtitle {
            font-size: 14px;
            color: #d0d0d0; /* Gris muy claro para mejor contraste */
            margin-bottom: 20px;
            letter-spacing: 1px;
            position: relative;
            padding-left: 25px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .hero-subtitle::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 3px; /* Un poco más grueso */
            background-color: #779B2C;
        }

        .hero-title {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 30px;
            letter-spacing: -1px;
            color: #ffffff;
            /* Sombra para separar texto del fondo bosque */
            text-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .hero-description {
            font-size: 17px;
            color: #f0f0f0; /* Blanco casi puro */
            margin-bottom: 40px;
            border-left: 3px solid #779B2C;
            padding-left: 25px;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }

        .hero-description strong {
            color: #fff;
            font-weight: 700;
        }

        .learn-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 0;
            transition: gap 0.3s ease;
            text-decoration: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }
        
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .learn-more-btn:hover {
            gap: 25px;
            color: #779B2C;
        }

        .learn-more-btn .arrow-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .learn-more-btn:hover .arrow-circle {
            border-color: #779B2C;
            background: rgba(119, 155, 44, 0.2);
        }

        .learn-more-btn .arrow {
            font-size: 20px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            #home { padding: 0 80px; }
            header { padding: 30px 80px; }
            .hero-title { font-size: 54px; }
            .machine-image { width: 70%; }
            .color-backdrop { right: 18%; width: 30%; }
        }

        @media (max-width: 992px) {
            body { overflow-y: auto; min-height: 100vh; }
            
            #home {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 100px 50px 60px;
                min-height: 100vh;
                height: auto;
            }
            
            header {
                padding: 25px 50px;
                /* Fondo suave en móvil para que el logo se vea bien sobre cualquier parte de la foto */
                background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            }
            
            .hero-content { 
                max-width: 100%; 
                width: 100%;
                text-align: center; 
                margin-left: 0;
            }
            
            .hero-subtitle { font-size: 16px; margin-bottom: 25px; padding-left: 0; justify-content: center; display: flex;}
            .hero-subtitle::before { display: none; }
            
            .hero-title { font-size: 52px; margin-bottom: 30px; line-height: 1.2; }
            
            .hero-description {
                font-size: 18px;
                margin-bottom: 40px;
                line-height: 1.7;
                padding-left: 0;
                border-left: none;
            }
            
            .learn-more-btn { 
                margin: 0 auto;
                justify-content: center;
                display: flex;
                font-size: 18px;
                gap: 20px;
            }
            
            .arrow-circle { width: 40px !important; height: 40px !important; }
            
            .color-backdrop { display: none; }
            
            .machine-image { display: none; }
        }
        
        @media (max-width: 768px) {
            #home { padding: 90px 40px 60px; }
            header { padding: 20px 40px; }
            .hero-subtitle { font-size: 15px; }
            .hero-title { font-size: 44px; line-height: 1.2; margin-bottom: 25px; }
            .hero-description { font-size: 17px; line-height: 1.7; margin-bottom: 35px; }
            .learn-more-btn { font-size: 17px; }
        }
        
        @media (max-width: 480px) {
            #home { padding: 80px 30px 50px; }
            header { padding: 18px 30px; }
            .hero-subtitle { font-size: 14px; margin-bottom: 20px; }
            .hero-title { font-size: 36px; margin-bottom: 20px; line-height: 1.2; }
            .hero-description { font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
            .learn-more-btn { font-size: 16px; padding: 10px 0; gap: 18px; }
            .arrow-circle { width: 38px !important; height: 38px !important; }
        }
    </style>
</head>
<body>
    <div id="home">
        <header>
            <img src="/AppMindAr/assets/LOGO%20SIED%20SOLO-01-BluIfg0u.png" alt="Logo SIED" class="header-logo">
        </header>

        <div class="color-backdrop"></div>
        
        <img src="assets/bosque.png" alt="Mariposa Cometa" class="machine-image">

        <div class="hero-content">
            <div class="hero-subtitle">Ciencias Naturales - SIED</div>
            <h1 class="hero-title">Explorá el Mundo Biológico en 3D</h1>
            <p class="hero-description">
                Descubrí la <strong>flora, fauna y ecosistemas</strong> a través de 
                modelos interactivos en <strong>Realidad Aumentada</strong>.
            </p>
            <a href="bio-elements.html" class="learn-more-btn">
                Ver colección
                <span class="arrow-circle">
                    <span class="arrow">&rarr;</span>
                </span>
            </a>
        </div>
        
        </div>
</body>
</html>
