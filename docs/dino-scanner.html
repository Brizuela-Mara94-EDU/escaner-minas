<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Dino AR - Escáner Barcode</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial;
      background: #000;
      color: #fff;
      overflow-y: auto;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .hidden {
      display: none !important;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 10;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }

    .header-logo {
      height: 120px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: transform 0.3s ease;
    }

    .header-logo:hover {
      transform: scale(1.05);
    }

    .logo {
      font-weight: 700;
      font-size: 22px;
      color: #fff;
      text-decoration: none;
    }

    .logo span {
      color: #00ff99;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }

    .close-btn:hover {
      background: rgba(0,255,153,0.3);
      border-color: #00ff99;
    }

    .scanner-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vmin;
      height: 70vmin;
      max-width: 400px;
      max-height: 400px;
      border: 3px solid rgba(0,255,153,0.6);
      border-radius: 12px;
      z-index: 15;
      pointer-events: none;
      box-shadow: 0 0 40px rgba(0,255,153,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    .scanner-frame::before,
    .scanner-frame::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 4px solid #00ff99;
    }

    .scanner-frame::before {
      top: -4px;
      left: -4px;
      border-right: none;
      border-bottom: none;
    }

    .scanner-frame::after {
      bottom: -4px;
      right: -4px;
      border-left: none;
      border-top: none;
    }

    .corner-tl, .corner-tr {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 4px solid #00ff99;
      z-index: 16;
      pointer-events: none;
    }

    .corner-tl {
      top: -4px;
      right: -4px;
      border-left: none;
      border-bottom: none;
    }

    .corner-tr {
      bottom: -4px;
      left: -4px;
      border-right: none;
      border-top: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0,255,153,0.4); }
      50% { box-shadow: 0 0 60px rgba(0,255,153,0.7); }
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ff99, transparent);
      animation: scan 2s linear infinite;
      z-index: 16;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(70vmin); }
    }

    .status-box {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(0,255,153,0.4);
      border-radius: 12px;
      padding: 20px 32px;
      z-index: 20;
      text-align: center;
      backdrop-filter: blur(10px);
      min-width: 300px;
    }

    .status-title {
      font-size: 14px;
      color: #00ff99;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }

    .instructions {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 12px 24px;
      z-index: 20;
      text-align: center;
      color: #9a9a9a;
      font-size: 13px;
      backdrop-filter: blur(5px);
    }

    .mobile-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(0,255,153,0.4);
      border-radius: 8px;
      padding: 10px 20px;
      z-index: 20;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.5s ease-out;
    }

    .model-info {
      position: fixed;
      top: 100px;
      left: 30%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(0,255,153,0.5);
      border-radius: 10px;
      padding: 16px 28px;
      z-index: 20;
      text-align: center;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s;
      max-width: 300px;
    }

    .model-info.active {
      opacity: 1;
    }

    .model-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .model-subtitle {
      font-size: 12px;
      color: #00ff99;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .model-description {
      font-size: 11px;
      color: #00ff99;
      margin-top: 8px;
      line-height: 1.4;
      max-width: 250px;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(0,255,153,0.3);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0,255,153,0.2);
      border-top-color: #00ff99;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Controles de zoom para desktop */
    .zoom-controls {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(0,255,153,0.4);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .zoom-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .zoom-btn:hover {
      background: rgba(0,255,153,0.3);
      border-color: #00ff99;
      transform: scale(1.05);
    }

    .zoom-btn:active {
      transform: scale(0.95);
    }

    .zoom-indicator {
      padding: 8px 12px;
      background: rgba(0,255,153,0.2);
      border-radius: 6px;
      color: #00ff99;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      border: 1px solid rgba(0,255,153,0.3);
      min-width: 60px;
    }

    /* Controles de rotación para desktop */
    .rotation-controls {
      position: fixed;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 8px;
      z-index: 20;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(0,255,153,0.4);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .rotation-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .rotation-btn:hover {
      background: rgba(0,255,153,0.3);
      border-color: #00ff99;
      transform: scale(1.05);
    }

    .rotation-btn:active {
      background: rgba(0,255,153,0.5);
      transform: scale(0.95);
    }

    #rotateUp {
      grid-column: 2;
      grid-row: 1;
    }

    #rotateLeft {
      grid-column: 1;
      grid-row: 2;
    }

    #rotateReset {
      grid-column: 2;
      grid-row: 2;
      font-size: 24px;
    }

    #rotateRight {
      grid-column: 3;
      grid-row: 2;
    }

    #rotateDown {
      grid-column: 2;
      grid-row: 3;
    }

    /* Botón de captura integrado en controles de zoom (desktop) */
    .capture-btn-integrated {
      margin-top: 8px;
      background: rgba(0,255,153,0.2) !important;
      border-color: rgba(0,255,153,0.4) !important;
      font-size: 20px;
    }

    .capture-btn-integrated:hover {
      background: rgba(0,255,153,0.4) !important;
      border-color: #00ff99 !important;
    }

    .capture-btn-integrated.capturing {
      background: rgba(255,165,0,0.3) !important;
      border-color: #ffa500 !important;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }

    .capture-btn-integrated.captured {
      background: rgba(0,200,0,0.4) !important;
      border-color: #00c800 !important;
      pointer-events: none;
    }

    .capture-btn-integrated.error {
      background: rgba(200,0,0,0.4) !important;
      border-color: #c80000 !important;
      pointer-events: none;
    }

    /* Botón de captura para móvil */
    .capture-btn-mobile {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(0,255,153,0.9);
      border: 3px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,255,153,0.4);
    }

    .capture-btn-mobile:active {
      transform: scale(0.9);
    }

    .capture-btn-mobile.capturing {
      background: rgba(255,165,0,0.9);
      border-color: #ffa500;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }

    .capture-btn-mobile.captured {
      background: rgba(0,200,0,0.9);
      border-color: #00c800;
      pointer-events: none;
    }

    .capture-btn-mobile.error {
      background: rgba(200,0,0,0.9);
      border-color: #c80000;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .scanner-frame {
        width: 80vmin;
        height: 80vmin;
      }
      .header {
        padding: 20px;
      }
      .header-logo {
        height: 40px;
      }
      .logo {
        font-size: 18px;
      }
      .zoom-controls, .rotation-controls {
        display: none;
      }
      .capture-btn-mobile {
        bottom: 90px;
        right: 16px;
        width: 56px;
        height: 56px;
        font-size: 26px;
      }
    }

    /* Botón de resetear escáner */
    .reset-scan-btn {
      position: fixed;
      bottom: 100px;
      left: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      background: rgba(0,255,153,0.9);
      border: 2px solid rgba(255,255,255,0.3);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0,255,153,0.4);
    }

    .reset-scan-btn.visible {
      display: flex;
    }

    .reset-scan-btn:hover {
      background: rgba(0,255,153,1);
      border-color: #fff;
      transform: scale(1.05);
    }

    .reset-scan-btn:active {
      transform: scale(0.95);
    }

    @media (min-width: 1025px) {
      .capture-btn-mobile {
        display: none;
      }
    }

    @media (max-width: 1024px) {
      .zoom-controls, .rotation-controls {
        display: none;
      }
      .capture-btn-integrated {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .reset-scan-btn {
        bottom: 90px;
        left: 16px;
        padding: 10px 20px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .capture-btn-mobile {
        bottom: 80px;
        right: 12px;
        width: 52px;
        height: 52px;
        font-size: 24px;
      }
      .reset-scan-btn {
        bottom: 80px;
        left: 12px;
        padding: 8px 16px;
        font-size: 12px;
      }
    }
    
    #arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: -1 !important;
    }

    .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 0 !important;
    }

    a-scene {
      width: 100% !important;
      height: 100% !important;
    }

    /* Ajuste de aspect ratio para evitar deformación en móviles */
    @media (max-width: 768px) {
      .a-canvas {
        object-fit: contain !important;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="header">
    <div class="logo">🦕 Dino <span>AR</span></div>
    <button class="close-btn" id="closeBtn" title="Cerrar">✕</button>
  </div>

  <div class="scanner-frame">
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="scan-line"></div>
  </div>

  <div class="mobile-hint" id="mobileHint" style="display: none;">
    <div style="font-size: 11px; opacity: 0.8; margin-bottom: 4px;">CONTROLES:</div>
    <div style="font-size: 12px;">🖐️ 1 dedo: Rotar | 🤏 2 dedos: Zoom</div>
  </div>

  <div class="model-info" id="modelInfo">
    <div class="model-name" id="modelName">Dinosaurio</div>
    <div class="model-subtitle">Barcode AR - Modelo 3D</div>
    <div class="model-description" id="modelDescription"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color: #00ff99; font-size: 14px; font-weight: 600;">Iniciando experiencia Dino...</div>
  </div>

  <div class="zoom-controls" id="zoomControls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <div class="zoom-indicator" id="zoomLevel">1.0x</div>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn capture-btn-integrated" id="captureBtn" title="Capturar foto">📷</button>
  </div>

  <div class="rotation-controls" id="rotationControls">
    <button class="rotation-btn" id="rotateUp">↑</button>
    <button class="rotation-btn" id="rotateLeft">←</button>
    <button class="rotation-btn" id="rotateReset">⟲</button>
    <button class="rotation-btn" id="rotateRight">→</button>
    <button class="rotation-btn" id="rotateDown">↓</button>
  </div>

  <button class="capture-btn-mobile" id="captureBtnMobile" title="Capturar foto">📷</button>

  <button class="reset-scan-btn" id="resetScanBtn">
    <span>🔄</span>
    <span>Escanear otro</span>
  </button>

  <a-scene
  id="scene"
  embedded
  vr-mode-ui="enabled: false"
  arjs="
    sourceType: webcam;
    facingMode: environment;
    detectionMode: mono_and_matrix;
    matrixCodeType: 3x3;
    debugUIEnabled: false;
    
    maxDetectionRate: 30;
    minConfidence: 0.5;
    sourceWidth: 640;
    sourceHeight: 480;
    displayWidth: 640;
    displayHeight: 480;
  "
  renderer="logarithmicDepthBuffer: true; precision: mediump; antialias: true;"
>

    <a-marker id="marker0" type="barcode" value="0">
      <a-entity 
        id="model0"
        class="ar-model"
        gltf-model="/AppMindAr/models/brachiosaurus.glb" 
        scale="0.065 0.065 0.065" 
        position="0 -0.62 -1.75"
        rotation="0 300 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker1" type="barcode" value="1">
      <a-entity 
        id="model1"
        class="ar-model"
        gltf-model="/AppMindAr/models/trex.glb" 
        scale="0.15 0.15 0.15" 
        position="0 -0.4 -1.7"
        rotation="0 90 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker2" type="barcode" value="2">
      <a-entity 
        id="model2"
        class="ar-model"
        gltf-model="/AppMindAr/models/triceratops.glb" 
        scale="1 1 1" 
        position="0 -0.1 -1.5"
        rotation="0 45 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker3" type="barcode" value="3">
      <a-entity 
        id="model3"
        class="ar-model"
        gltf-model="/AppMindAr/models/velociraptor.glb" 
        scale="0.35 0.35 0.35" 
        position="0 -0.3 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker4" type="barcode" value="4">
      <a-entity 
        id="model4"
        class="ar-model"
        gltf-model="/AppMindAr/models/stegosaurio.glb" 
        scale="0.2 0.2 0.2" 
        position="0 -0.1 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker5" type="barcode" value="5">
      <a-entity 
        id="model5"
        class="ar-model"
        gltf-model="/AppMindAr/models/ankylosaurus.glb" 
        scale="0.2 0.2 0.2" 
        position="0 -0.1 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Estado global
    let currentModel = null;
    let currentScale = 0.5;
    let currentRotation = { x: -90, y: 0, z: 0 };
    let lastDetectedMarker = null;
    let persistentModel = null;
    let arSystem = null; 
    let trackingPaused = false; 



    // Configuración personalizada para cada modelo
    const modelConfig = {
      0: { scale: 0.065, position: '0 -0.62 -1.75', rotation: '0 300 0' },   // Brachiosaurus
      1: { scale: 0.15, position: '0 -0.4 -1.7', rotation: '0 90 0' },        // T-Rex
      2: { scale: 1, position: '0 -0.1 -1.5', rotation: '0 45 0' },           // Triceratops
      3: { scale: 0.35, position: '0 -0.3 -1.5', rotation: '0 0 0' },         // Velociraptor
      4: { scale: 0.2, position: '0 -0.1 -1.5', rotation: '0 0 0' },          // Stegosaurio
      5: { scale: 0.2, position: '0 -0.1 -1.5', rotation: '0 0 0' }           // Ankylosaurus
    };

    // Descripciones de modelos
    const modelDescriptions = {
      0: 'El más grande de los dinosaurios. Herbívoro de cuello largo.',
      1: 'El depredador más feroz. Rex significa rey en latín.',
      2: 'Tiene tres cuernos característicos. Era herbívoro defensivo.',
      3: 'Pequeño pero ágil y rápido. Cazador inteligente.',
      4: 'Tenía placas óseas en el lomo. Herbívoro pacífico.',
      5: 'Blindado con placas de armadura. Muy resistente.'
    };

    // Mapeo de nombres de modelos
    const modelNames = {
      0: 'Brachiosaurus',
      1: 'Tyrannosaurus Rex',
      2: 'Triceratops',
      3: 'Velociraptor',
      4: 'Stegosaurio',
      5: 'Ankylosaurus'
    };
    
    // Mapa de modelos
    const markerModels = {
      0: '/AppMindAr/models/brachiosaurus.glb',
      1: '/AppMindAr/models/trex.glb',
      2: '/AppMindAr/models/triceratops.glb',
      3: '/AppMindAr/models/velociraptor.glb',
      4: '/AppMindAr/models/stegosaurio.glb',
      5: '/AppMindAr/models/ankylosaurus.glb'
    };

    // Inicializar al cargar la página
    window.addEventListener('load', function () {
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading');
      const closeBtn = document.getElementById('closeBtn');
      const mobileHint = document.getElementById('mobileHint');
      const modelInfo = document.getElementById('modelInfo');
      const modelName = document.getElementById('modelName');
      const modelDescription = document.getElementById('modelDescription');
      const resetScanBtn = document.getElementById('resetScanBtn');
      
      console.log('🎬 Página cargada, esperando a que AR.js esté listo...');
      
      // Detectar si es móvil/tablet
      const isMobile = ('ontouchstart' in window) && window.innerWidth <= 1024;
      
      if (isMobile && mobileHint) {
        setTimeout(() => {
          mobileHint.style.display = 'block';
          setTimeout(() => {
            mobileHint.style.opacity = '0';
            mobileHint.style.transition = 'opacity 1s';
            setTimeout(() => {
              mobileHint.style.display = 'none';
            }, 1000);
          }, 5000);
        }, 2000);
      }

      // Botón cerrar
      closeBtn.addEventListener('click', () => {
        window.history.back();
      });

      // Botón resetear escáner
      if (resetScanBtn) {
        resetScanBtn.addEventListener('click', () => {
          console.log('🔄 Reseteando escáner...');
          
          // Eliminar modelo persistente
          if (persistentModel && persistentModel.parentNode) {
            persistentModel.parentNode.removeChild(persistentModel);
          }
          
          // Resetear estado
          persistentModel = null;
          currentModel = null;
          lastDetectedMarker = null;
          currentScale = 0.5;
          currentRotation = { x: -90, y: 0, z: 0 };
          trackingPaused = false;
          
          // RECREAR todos los marcadores en el DOM
          console.log('🔓 Recreando marcadores...');
          const markerIds = [0, 1, 2, 3, 4, 5];
          
          markerIds.forEach(id => {
            // Crear nuevo marcador
            const newMarker = document.createElement('a-marker');
            newMarker.setAttribute('id', `marker${id}`);
            newMarker.setAttribute('type', 'barcode');
            newMarker.setAttribute('value', id);
            
            scene.appendChild(newMarker);
            
            setupMarkerEvents(newMarker, id);
          });
          
          console.log('✅ Marcadores recreados');
          
          // Restaurar el video de la cámara
          const video = document.querySelector('video');
          if (video) {
            video.style.opacity = '1';
            console.log('📹 Video restaurado');
          }
          
          // Restaurar el cuadrado de escaneo
          const scannerFrame = document.querySelector('.scanner-frame');
          if (scannerFrame) {
            scannerFrame.style.opacity = '1';
            console.log('🎯 Cuadrado de escaneo restaurado');
          }
          
          // Restaurar fondo transparente
          document.body.style.backgroundColor = '#000';
          const sceneEl = document.querySelector('a-scene');
          if (sceneEl) {
            sceneEl.style.background = 'transparent';
          }
          
          // Actualizar UI
          modelInfo.classList.remove('active');
          resetScanBtn.classList.remove('visible');
          if (document.getElementById('zoomLevel')) {
             document.getElementById('zoomLevel').textContent = '1.0x';
          }
          
          console.log('✅ Escáner reseteado, listo para detectar nuevo marcador');
        });
      }

      // Esperar a que la escena esté cargada
      scene.addEventListener('loaded', function () {
        console.log('✅ Escena A-Frame cargada');
      });

      // Ocultar loader cuando AR.js esté listo
      scene.addEventListener('arjs-video-loaded', function () {
        console.log('✅ AR.js: Video cargado');
        loading.style.display = 'none';
        
        // Guardar referencia al sistema AR.js
        arSystem = scene.systems.arjs || scene.systems['ar-js'];
        console.log('✅ Sistema AR.js capturado:', arSystem ? 'OK' : 'NO ENCONTRADO');
      });

      // Fallback
      setTimeout(function() {
        if (loading.style.display !== 'none') {
          console.log('⚠️ Timeout: Ocultando loader');
          loading.style.display = 'none';
        }
      }, 5000);

      
      // Función setupMarkerEvents
      function setupMarkerEvents(marker, i) {
        
        marker.addEventListener('markerFound', function() {
          if (trackingPaused) {
            return;
          }
          
          // --- REEMPLAZAR AQUÍ ---
          // Reproducir audio del dinosaurio (AHORA CON LAZY LOAD)
          try {
            // Mapeo de audios (ahora local)
            const audioMap = {
              0: '/AppMindAr/sounds/brachiosaurus-full.mp3',
              1: '/AppMindAr/sounds/trex-full.mp3',
              2: '/AppMindAr/sounds/triceratops-full.mp3',
              3: '/AppMindAr/sounds/velociraptor-full.mp3',
              4: '/AppMindAr/sounds/stegosaurio-full.mp3',
              5: '/AppMindAr/sounds/ankylosaurus-full.mp3'
            };

            const audioSrc = audioMap[i];

            if (audioSrc) {
              // Creamos el audio SÓLO cuando se necesita
              const audio = new Audio(audioSrc);
              audio.currentTime = 0;
              
              // Importante: Manejar la promesa de play()
              const playPromise = audio.play();
              if (playPromise !== undefined) {
                playPromise.catch(error => {
                  // Esto evita que el navegador bloquee el script
                  console.error("Error al reproducir audio:", error);
                });
              }
            }
          } catch (e) {
             console.error("Error al crear audio:", e);
          }
          // --- FIN DEL REEMPLAZO ---
          
          console.log(`✅ Marcador ${i} detectado. Bloqueando...`);
          
          // 1. Pausar inmediatamente todo.
          trackingPaused = true; 
          lastDetectedMarker = i; 

          // 2. Obtener la cámara
          const camera = scene.querySelector('[camera]');
          if (!camera) return;

          // 3. Obtener config y CREAR UN MODELO NUEVO
          const config = modelConfig[i] || { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' };
          currentScale = config.scale;
          const rotParts = config.rotation.split(' ').map(Number);
          currentRotation = { x: rotParts[0], y: rotParts[1], z: rotParts[2] };

          console.log(`Creando modelo ${i} desde cero...`);
          
          persistentModel = document.createElement('a-entity');
          persistentModel.setAttribute('gltf-model', markerModels[i]);

          persistentModel.setAttribute('position', config.position);
          persistentModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          persistentModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          
          // 4. ELIMINAR todos los marcadores del DOM
          console.log('Eliminando todos los marcadores del DOM...');
          const allMarkerIds = [0, 1, 2, 3, 4, 5];
          allMarkerIds.forEach(markerId => {
            const markerEl = document.getElementById(`marker${markerId}`);
            if (markerEl) {
              markerEl.remove();
            }
          });
          console.log('Todos los marcadores eliminados.');

          // 5. Ocultar el video y la UI de escaneo
          setTimeout(() => {
            const video = document.querySelector('video');
            if (video) {
              video.style.opacity = '0';
              video.style.transition = 'opacity 0.5s ease';
            }
            const scannerFrame = document.querySelector('.scanner-frame');
            if (scannerFrame) {
              scannerFrame.style.opacity = '0';
              scannerFrame.style.transition = 'opacity 0.5s ease';
            }
            document.body.style.backgroundColor = '#000';
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl) sceneEl.style.background = '#000';
            console.log('UI de escaneo oculta.');
          }, 100); 
          
          // 6. Adjuntar el modelo nuevo a la cámara
          camera.appendChild(persistentModel);
          currentModel = persistentModel;
          console.log(`✅ Modelo ${i} persistente creado y tracking detenido.`);

          // 7. Mostrar la información del modelo
          modelName.textContent = modelNames[i] || 'Dinosaurio';
          modelDescription.textContent = modelDescriptions[i] || '';
          modelInfo.classList.add('active');
          
          // 8. Mostrar botón de resetear
          if (resetScanBtn) {
            resetScanBtn.classList.add('visible');
          }
        });

        marker.addEventListener('markerLost', function() {
          if (trackingPaused) {
            return;
          }
          console.log(`❌ Marcador ${i} perdido`);
        });
      }
      
      // Inicializar marcadores
      const markerIds = [0, 1, 2, 3, 4, 5];
      
      markerIds.forEach(i => {
        const marker = document.getElementById(`marker${i}`);
        if (!marker) return;
        
        setupMarkerEvents(marker, i);
      });

      // Controles de zoom (Desktop)
      const zoomIn = document.getElementById('zoomIn');
      const zoomOut = document.getElementById('zoomOut');
      const zoomLevel = document.getElementById('zoomLevel');

      if (zoomIn) {
        zoomIn.addEventListener('click', () => {
          if (!persistentModel && !currentModel) return;
          currentScale = Math.min(currentScale + 0.1, 3.0);
          const targetModel = persistentModel || currentModel;
          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
        });
      }

      if (zoomOut) {
        zoomOut.addEventListener('click', () => {
          if (!persistentModel && !currentModel) return;
          currentScale = Math.max(currentScale - 0.1, 0.1);
          const targetModel = persistentModel || currentModel;
          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
        });
      }

      // Controles de rotación (Desktop)
      const rotateUp = document.getElementById('rotateUp');
      const rotateDown = document.getElementById('rotateDown');
      const rotateLeft = document.getElementById('rotateLeft');
      const rotateRight = document.getElementById('rotateRight');
      const rotateReset = document.getElementById('rotateReset');

      if (rotateUp) {
        rotateUp.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.x += 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateDown) {
        rotateDown.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.x -= 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateLeft) {
        rotateLeft.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.y += 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateRight) {
        rotateRight.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.y -= 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateReset) {
        rotateReset.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel || !lastDetectedMarker) return;
          
          const markerId = lastDetectedMarker;
          const config = modelConfig[markerId] || { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' };
          
          currentScale = config.scale;
          const rotParts = config.rotation.split(' ').map(v => parseFloat(v));
          currentRotation = { x: rotParts[0], y: rotParts[1], z: rotParts[2] };
          
          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          targetModel.setAttribute('position', config.position);
          
          if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
          console.log(`🔄 Modelo ${markerId} restaurado a valores originales:`, config);
        });
      }

      // Captura de foto (Desktop)
      const captureBtn = document.getElementById('captureBtn');
      if (captureBtn) {
        captureBtn.addEventListener('click', captureScreenshot);
      }

      // Captura de foto (Mobile)
      const captureBtnMobile = document.getElementById('captureBtnMobile');
      if (captureBtnMobile) {
        captureBtnMobile.addEventListener('click', captureScreenshot);
      }

      // Función de captura de screenshot
      function captureScreenshot() {
        const btn = isMobile ? captureBtnMobile : captureBtn;
        if (!btn) return;

        console.log('📸 Capturando screenshot...');
        btn.classList.add('capturing');

        requestAnimationFrame(() => {
          try {
            const canvas = scene.querySelector('canvas');
            if (!canvas) {
              throw new Error('No se encontró el canvas');
            }

            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = canvas.width;
            finalCanvas.height = canvas.height;
            const ctx = finalCanvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
            
            ctx.drawImage(canvas, 0, 0);

            finalCanvas.toBlob((blob) => {
              if (!blob) {
                throw new Error('Error al crear blob');
              }

              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
              const modelLabel = modelNames[lastDetectedMarker] || 'modelo';
              link.download = `DinoAR-${modelLabel}-${timestamp}.png`;
              link.href = url;
              link.click();
              
              URL.revokeObjectURL(url);
              
              console.log('✅ Screenshot guardado con fondo negro');
              btn.classList.remove('capturing');
              btn.classList.add('captured');
              
              setTimeout(() => {
                btn.classList.remove('captured');
              }, 2000);
            }, 'image/png', 1.0);
          } catch (error) {
            console.error('❌ Error al capturar:', error);
            btn.classList.remove('capturing');
            btn.classList.add('error');
            
            setTimeout(() => {
              btn.classList.remove('error');
            }, 2000);
          }
        });
      }

      // Controles táctiles (Mobile)
      if (isMobile) {
        let touchStartDist = 0;
        let touchStartScale = currentScale;
        let touchStartRotY = 0;
        let lastTouchY = 0;

        scene.addEventListener('touchstart', (e) => {
          if (!currentModel) return;
          
          if (e.touches.length === 2) {
            // Pinch zoom
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            touchStartDist = Math.sqrt(dx * dx + dy * dy);
            touchStartScale = currentScale;
          } else if (e.touches.length === 1) {
            // Rotación
            touchStartRotY = currentRotation.y;
            lastTouchY = e.touches[0].pageY;
          }
        });

        scene.addEventListener('touchmove', (e) => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          e.preventDefault();
          
          if (e.touches.length === 2) {
            // Pinch zoom
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const scaleFactor = dist / touchStartDist;
            currentScale = Math.max(0.1, Math.min(3.0, touchStartScale * scaleFactor));
            targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
          } else if (e.touches.length === 1) {
            // Rotación horizontal
            const deltaX = e.touches[0].pageX - window.innerWidth / 2;
            currentRotation.y = touchStartRotY + (deltaX * 0.5);
            
            // Rotación vertical
            const deltaY = e.touches[0].pageY - lastTouchY;
            currentRotation.x -= deltaY * 0.5;
            lastTouchY = e.touches[0].pageY;
            
            targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          }
        });
      }
      // --- Ajuste de cámara para móviles y aspect ratio ---
      const sceneEl = document.querySelector('a-scene');

      sceneEl.addEventListener('arjs-video-loaded', () => {
        const arVideo = document.querySelector('video');
        const arCanvas = document.querySelector('.a-canvas');
        
        if (arVideo) {
          arVideo.setAttribute('playsinline', '');
          arVideo.style.position = 'fixed';
          arVideo.style.top = '0';
          arVideo.style.left = '0';
          arVideo.style.width = '100vw';
          arVideo.style.height = '100vh';
          arVideo.style.objectFit = 'cover';
          console.log('🎥 Cámara ajustada al tamaño completo');
        }

        // Ajustar aspect ratio del canvas para evitar deformación
        if (arCanvas) {
          const updateCanvasSize = () => {
            const aspectRatio = 16 / 9; 
            const windowRatio = window.innerWidth / window.innerHeight;
            
            if (isMobile) {
              arCanvas.style.objectFit = 'contain';
              arCanvas.style.width = '100vw';
              arCanvas.style.height = '100vh';
            }
            
            console.log('📐 Canvas aspect ratio ajustado:', windowRatio.toFixed(2));
          };
          
          updateCanvasSize();
          window.addEventListener('resize', updateCanvasSize);
        }

        // Ajustar cámara de A-Frame para mantener proporciones
        const camera = scene.querySelector('[camera]');
        if (camera) {
          const fov = isMobile ? 70 : 60;
          camera.setAttribute('fov', fov);
          console.log(`📷 FOV de cámara ajustado a ${fov}°`);
        }
      });

    });
  </script>
</body>
</html>
