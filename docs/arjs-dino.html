<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Experiencia AR - Dinos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="/AppMindAr/style.css">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>

<body>
  <!-- Interfaz de escaneo -->
  <div id="scanning-ui" class="ui-layer">
    <div class="projection-box"><div></div></div>
    <div class="search-text">Apunta al centro de un marcador...</div>
  </div>

  <!-- Panel de información -->
  <div id="dino-info-panel" class="hidden">
    <div class="info-content">
      <h3 id="dino-name">Nombre del Modelo</h3>
      <p id="dino-description">Descripción...</p>
      <div class="interaction-buttons">
        <button id="play-sound-btn">🔊 Sonido</button>
        <button id="take-photo-btn">📸 Foto</button>
      </div>
    </div>
    <button id="close-info-btn">✕</button>
  </div>

  <!-- Botón de reescanear -->
  <button id="restart-button" class="hidden">🔄 Reescanear</button>

  <!-- Estado -->
  <div id="detection-status" class="detection-status">Buscando marcador...</div>

  <!-- Contenedor AR -->
  <div id="ar-container"></div>

  <script>
  const scanningUI = document.querySelector("#scanning-ui");
  const restartButton = document.querySelector("#restart-button");
  const dinoInfoPanel = document.querySelector("#dino-info-panel");
  const closeInfoButton = document.querySelector("#close-info-btn");
  const playSoundButton = document.querySelector("#play-sound-btn");
  const detectionStatus = document.querySelector("#detection-status");
  const takePhotoBtn = document.querySelector("#take-photo-btn");

  let sceneEl;
  let isModelPlaced = false;
  let currentModel = null;

  const roarAudio = new Audio('/AppMindAr/sounds/roar.mp3');
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

  const modelInfo = {
    0: { name: "Brachiosaurus", emoji: "🦕", description: "Gigante herbívoro de cuello largo.", scale: "0.065 0.065 0.05", scaleMobile: "0.05 0.05 0.04", position: "0 -0.62 -1.75", rotation: "0 300 0" },
    1: { name: "Tyrannosaurus Rex", emoji: "🦖", description: "El rey de los depredadores.", scale: "0.15 0.15 0.15", scaleMobile: "0.1 0.1 0.1", position: "0 -0.4 -1.7", rotation: "0 90 0" },
    2: { name: "Triceratops", emoji: "🦏", description: "Herbívoro con tres cuernos.", scale: "1 1 0.75", scaleMobile: "0.4 0.4 0.4", position: "0 -0.1 -1.5", rotation: "0 45 0" },
    3: { name: "Velociraptor", emoji: "🦎", description: "Cazador inteligente y ágil.", scale: "0.35 0.35 0.35", scaleMobile: "0.15 0.15 0.15", position: "0 -0.3 -1.5", rotation: "0 0 0" },
    4: { name: "Stegosaurio", emoji: "🦕", description: "Herbívoro con placas óseas distintivas.", scale: "0.2 0.2 0.2", scaleMobile: "0.1 0.1 0.10", position: "0 -0.1 -1.5", rotation: "0 0 0" },
    5: { name: "Anquilosaurio", emoji: "🛡️", description: "El 'tanque viviente' del Cretácico.", scale: "0.02 0.02 0.02", scaleMobile: "0.0022 0.0022 0.0022", position: "0 -0.1 -1.5", rotation: "0 0 0" }
  };

  // Inicialización directa de la escena (como hacías antes)
  window.addEventListener("load", () => {
    initAR();
  });

  function initAR() {
    sceneEl = document.createElement('a-scene');
    sceneEl.setAttribute('arjs', 'sourceType: webcam; facingMode: environment; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;');
    sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
    sceneEl.setAttribute('embedded', '');
    sceneEl.setAttribute('loading-screen', 'enabled: false');
    sceneEl.setAttribute('screenshot', 'width: 1920; height: 1080;');

    document.querySelector('#ar-container').appendChild(sceneEl);

    const assets = document.createElement('a-assets');
    assets.innerHTML = `
      <a-asset-item id="brachiosaurus" src="/AppMindAr/models/brachiosaurus.glb"></a-asset-item>
      <a-asset-item id="trex" src="/AppMindAr/models/trex.glb"></a-asset-item>
      <a-asset-item id="triceratops" src="/AppMindAr/models/triceratops.glb"></a-asset-item>
      <a-asset-item id="velociraptor" src="/AppMindAr/models/velociraptor.glb"></a-asset-item>
      <a-asset-item id="stegosaurio" src="/AppMindAr/models/stegosaurio.glb"></a-asset-item>
      <a-asset-item id="ankylosaurio" src="/AppMindAr/models/ankylosaurus.glb"></a-asset-item>
    `;
    sceneEl.appendChild(assets);

    // Crear marcadores
    for (let i = 0; i <= 5; i++) {
      const marker = document.createElement('a-marker');
      marker.setAttribute('type', 'barcode');
      marker.setAttribute('value', i);
      marker.addEventListener('markerFound', () => handleMarkerFound(marker, i));
      sceneEl.appendChild(marker);
    }

    const camera = document.createElement('a-entity');
    camera.setAttribute('camera', '');
    sceneEl.appendChild(camera);

    detectionStatus.textContent = "Buscando marcador...";
  }

  function handleMarkerFound(marker, i) {
    if (isModelPlaced) return;
    const cfg = modelInfo[i];
    if (!cfg) return;

    const scale = isMobile ? cfg.scaleMobile : cfg.scale;
    const model = document.createElement('a-entity');
    model.setAttribute('gltf-model', `#${getModelFile(i)}`);
    model.setAttribute('scale', scale);
    model.setAttribute('rotation', cfg.rotation);
    model.setAttribute('position', cfg.position);
    model.setAttribute('animation-mixer', '');
    marker.appendChild(model);
    currentModel = model;
    isModelPlaced = true;

    scanningUI.classList.add("hidden");
    restartButton.classList.remove("hidden");
    detectionStatus.textContent = `🦖 ${cfg.name} detectado`;
    dinoInfoPanel.classList.remove("hidden");

    document.getElementById('dino-name').textContent = `${cfg.emoji} ${cfg.name}`;
    document.getElementById('dino-description').textContent = cfg.description;

    playRoar();
  }

  function getModelFile(index) {
    const files = ["brachiosaurus","trex","triceratops","velociraptor","stegosaurio","ankylosaurio"];
    return files[index] || files[0];
  }

  function playRoar() {
    roarAudio.currentTime = 0;
    roarAudio.play().catch(e => console.log('Audio error', e));
  }

  playSoundButton.addEventListener("click", playRoar);

  closeInfoButton.addEventListener("click", () => {
    dinoInfoPanel.classList.add("hidden");
  });

  // 🔄 Reescanear
  restartButton.addEventListener("click", () => {
    isModelPlaced = false;
    const models = document.querySelectorAll("a-marker a-entity[gltf-model]");
    models.forEach(m => m.parentNode.removeChild(m));
    dinoInfoPanel.classList.add("hidden");
    restartButton.classList.add("hidden");
    scanningUI.classList.remove("hidden");
    detectionStatus.textContent = "Buscando marcador...";
    roarAudio.pause();
  });

  // 📸 Foto (descarga automática)
  takePhotoBtn.addEventListener("click", () => {
    const scene = document.querySelector("a-scene");
    if (scene && scene.components.screenshot) {
      const dataUrl = scene.components.screenshot.getCanvas("perspective").toDataURL("image/png");
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = "captura_dino.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      alert("📸 Foto descargada correctamente");
    } else {
      alert("⚠️ No se pudo capturar la imagen.");
    }
  });
  </script>
</body>
</html>
