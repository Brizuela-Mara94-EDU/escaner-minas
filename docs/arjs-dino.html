<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Dino AR - Escáner</title>

  <!-- A-Frame y AR.js (aframe build) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* Estilos compactos basados en scanner.html */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Segoe UI, system-ui, -apple-system, Arial}
    a-scene{width:100%!important;height:100%!important}
    .header{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:40}
    .close-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}
    .scanner-frame{position:fixed;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:70vmin;height:70vmin;max-width:420px;max-height:420px;border-radius:12px;border:3px solid rgba(21,59,130,0.6);z-index:30;pointer-events:none}
    .scan-line{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#4A90E2,transparent);animation:scan 2s linear infinite}
    @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(70vmin)}}
    .model-info{position:fixed;top:84px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:12px 20px;border-radius:10px;border:1px solid rgba(21,59,130,0.4);z-index:40;opacity:0;transition:opacity .25s}
    .model-info.active{opacity:1}
    .loading{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(0,0,0,0.9);padding:20px;border-radius:12px;border:1px solid rgba(21,59,130,0.3)}
    .mobile-hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);padding:8px 14px;border-radius:8px;border:1px solid rgba(21,59,130,0.3);z-index:40}
    .reset-scan-btn{position:fixed;right:18px;bottom:18px;background:#153B82;color:#fff;padding:10px 14px;border-radius:10px;border:none;z-index:40;cursor:pointer}
    .zoom-controls{position:fixed;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:40}
    .zoom-controls button{width:44px;height:44px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:#fff;cursor:pointer}
    .rotation-controls{position:fixed;left:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:40}
    .rotation-controls button{width:44px;height:44px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:#fff;cursor:pointer}
    .capture-btn{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;border:none;background:#153B82;color:#fff;font-size:20px;z-index:40}
    @media (max-width:768px){.scanner-frame{width:82vmin;height:82vmin}}
  </style>
</head>
<body>

  <!-- A-Frame scene con marcadores 10-15 -->
  <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">

    <a-marker id="marker10" type="barcode" value="10"></a-marker>
    <a-marker id="marker11" type="barcode" value="11"></a-marker>
    <a-marker id="marker12" type="barcode" value="12"></a-marker>
    <a-marker id="marker13" type="barcode" value="13"></a-marker>
    <a-marker id="marker14" type="barcode" value="14"></a-marker>
    <a-marker id="marker15" type="barcode" value="15"></a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- UI idéntica al scanner (estructura) -->
  <div class="header">
    <div style="color:#fff;font-weight:700">Dino AR</div>
    <button id="closeBtn" class="close-btn" title="Cerrar">✕</button>
  </div>

  <div class="scanner-frame">
    <div class="scan-line"></div>
  </div>

  <div class="model-info" id="modelInfo"><div id="modelName">Dino</div></div>
  <div class="loading" id="loading"><div style="font-weight:700;color:#4A90E2">Iniciando AR...</div></div>
  <div class="mobile-hint" id="mobileHint" style="display:none">1 dedo: rotar • 2 dedos: zoom</div>

  <button id="resetScanBtn" class="reset-scan-btn">🔄 Escanear otro</button>
  <button id="captureBtn" class="capture-btn" title="Capturar foto">📷</button>

  <div class="zoom-controls" id="zoomControls">
    <button id="zoomIn">+</button>
    <div id="zoomLevel" style="text-align:center;color:#fff">1.0x</div>
    <button id="zoomOut">−</button>
  </div>

  <div class="rotation-controls" id="rotationControls">
    <button id="rotateUp">↑</button>
    <button id="rotateDown">↓</button>
    <button id="rotateLeft">←</button>
    <button id="rotateRight">→</button>
    <button id="rotateReset">⤾</button>
  </div>

  <script>
    // Globals
    let currentModel = null;
    let persistentModel = null;
    let currentScale = 0.5;
    let currentRotation = { x: -90, y: 0, z: 0 };
    let lastDetectedMarker = null;
    let trackingPaused = false;

    // Friendly names for UI
    const modelNames = {
      10: 'Brachiosaurus',
      11: 'T-Rex',
      12: 'Triceratops',
      13: 'Velociraptor',
      14: 'Stegosaurio',
      15: 'Ankylosaurus'
    };

    // Per-model config
    const modelConfig = {
      10: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' },
      11: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' },
      12: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' },
      13: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' },
      14: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' },
      15: { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' }
    };

    // Marker -> GLB
    const markerModels = {
      10: '/AppMindAr/models/brachiosaurus.glb',
      11: '/AppMindAr/models/trex.glb',
      12: '/AppMindAr/models/triceratops.glb',
      13: '/AppMindAr/models/velociraptor.glb',
      14: '/AppMindAr/models/stegosaurio.glb',
      15: '/AppMindAr/models/ankylosaurus.glb'
    };

    // Helper: create and attach persistent model to camera
    function createPersistentModelFor(markerId, scene) {
      const cfg = modelConfig[markerId] || { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' };
      const modelEl = document.createElement('a-entity');
      modelEl.setAttribute('gltf-model', markerModels[markerId]);
      modelEl.setAttribute('position', cfg.position);
      modelEl.setAttribute('scale', `${cfg.scale} ${cfg.scale} ${cfg.scale}`);
      modelEl.setAttribute('rotation', cfg.rotation);
      return modelEl;
    }

    // Setup events for a marker element
    function setupMarkerEvents(markerEl, id, scene, ui) {
      markerEl.addEventListener('markerFound', () => {
        if (trackingPaused) return;
        console.log(`Marcador ${id} detectado`);
        trackingPaused = true;
        lastDetectedMarker = id;

        // create and attach
        const camera = scene.querySelector('[camera]');
        if (!camera) return;

        persistentModel = createPersistentModelFor(id, scene);
        camera.appendChild(persistentModel);
        currentModel = persistentModel;

        // remove markers from DOM so only persistent model remains
        [10,11,12,13,14,15].forEach(mid => {
          const m = document.getElementById(`marker${mid}`);
          if (m) m.remove();
        });

        // update UI
        ui.modelName.textContent = modelNames[id] || 'Modelo';
        ui.modelInfo.classList.add('active');
        ui.resetScanBtn.classList.add('visible');

        // hide scanner visuals
        const video = document.querySelector('video');
        if (video) video.style.opacity = '0';
        const scannerFrame = document.querySelector('.scanner-frame');
        if (scannerFrame) scannerFrame.style.opacity = '0';
      });

      markerEl.addEventListener('markerLost', () => {
        // optional: handle lost while not locked
        console.log(`Marcador ${id} perdido`);
      });
    }

    window.addEventListener('load', () => {
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading');
      const closeBtn = document.getElementById('closeBtn');
      const mobileHint = document.getElementById('mobileHint');
      const modelInfo = document.getElementById('modelInfo');
      const modelName = document.getElementById('modelName');
      const resetScanBtn = document.getElementById('resetScanBtn');
      const zoomIn = document.getElementById('zoomIn');
      const zoomOut = document.getElementById('zoomOut');
      const zoomLevel = document.getElementById('zoomLevel');
      const rotateUp = document.getElementById('rotateUp');
      const rotateDown = document.getElementById('rotateDown');
      const rotateLeft = document.getElementById('rotateLeft');
      const rotateRight = document.getElementById('rotateRight');
      const rotateReset = document.getElementById('rotateReset');
      const captureBtn = document.getElementById('captureBtn');

      const ui = { modelInfo, modelName, resetScanBtn };

      // mobile hint
      const isMobile = ('ontouchstart' in window) && window.innerWidth <= 1024;
      if (isMobile && mobileHint) {
        setTimeout(() => {
          mobileHint.style.display = 'block';
          setTimeout(() => { mobileHint.style.opacity = '0'; mobileHint.style.transition = 'opacity 1s';
            setTimeout(() => { mobileHint.style.display = 'none'; }, 1000);
          }, 5000);
        }, 2000);
      }

      // close
      if (closeBtn) closeBtn.addEventListener('click', () => window.history.back());

      // initial marker setup
      [10,11,12,13,14,15].forEach(id => {
        const markerEl = document.getElementById(`marker${id}`);
        if (!markerEl) return;
        setupMarkerEvents(markerEl, id, scene, ui);
      });

      // reset scan
      if (resetScanBtn) {
        resetScanBtn.addEventListener('click', () => {
          console.log('Reseteando escáner...');

          // remove persistent model
          if (persistentModel && persistentModel.parentNode) {
            persistentModel.parentNode.removeChild(persistentModel);
          }
          persistentModel = null;
          currentModel = null;
          lastDetectedMarker = null;
          currentScale = 0.5;
          currentRotation = { x: -90, y: 0, z: 0 };
          trackingPaused = false;

          // recreate markers in DOM
          [10,11,12,13,14,15].forEach(id => {
            const newMarker = document.createElement('a-marker');
            newMarker.setAttribute('id', `marker${id}`);
            newMarker.setAttribute('type', 'barcode');
            newMarker.setAttribute('value', id);
            scene.appendChild(newMarker);
            setupMarkerEvents(newMarker, id, scene, ui);
          });

          // restore visuals
          const video = document.querySelector('video'); if (video) video.style.opacity = '1';
          const scannerFrame = document.querySelector('.scanner-frame'); if (scannerFrame) scannerFrame.style.opacity = '1';
          document.body.style.backgroundColor = '#000';
          const sceneEl = document.querySelector('a-scene'); if (sceneEl) sceneEl.style.background = 'transparent';

          ui.modelInfo.classList.remove('active');
        });
      }

      // zoom
      if (zoomIn) zoomIn.addEventListener('click', () => {
        const target = persistentModel || currentModel; if (!target) return;
        currentScale = Math.min(currentScale + 0.1, 3.0);
        target.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
      });
      if (zoomOut) zoomOut.addEventListener('click', () => {
        const target = persistentModel || currentModel; if (!target) return;
        currentScale = Math.max(currentScale - 0.1, 0.1);
        target.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
      });

      // rotation
      if (rotateUp) rotateUp.addEventListener('click', () => { const t = persistentModel || currentModel; if (!t) return; currentRotation.x += 15; t.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`); });
      if (rotateDown) rotateDown.addEventListener('click', () => { const t = persistentModel || currentModel; if (!t) return; currentRotation.x -= 15; t.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`); });
      if (rotateLeft) rotateLeft.addEventListener('click', () => { const t = persistentModel || currentModel; if (!t) return; currentRotation.y += 15; t.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`); });
      if (rotateRight) rotateRight.addEventListener('click', () => { const t = persistentModel || currentModel; if (!t) return; currentRotation.y -= 15; t.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`); });
      if (rotateReset) rotateReset.addEventListener('click', () => {
        const t = persistentModel || currentModel; if (!t || !lastDetectedMarker) return;
        const cfg = modelConfig[lastDetectedMarker] || { scale: 0.5, position: '0 -0.5 -2', rotation: '-90 0 0' };
        currentScale = cfg.scale;
        const rp = cfg.rotation.split(' ').map(v => parseFloat(v)); currentRotation = { x: rp[0], y: rp[1], z: rp[2] };
        t.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        t.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        t.setAttribute('position', cfg.position);
        if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
      });

      // capture screenshot
      if (captureBtn) captureBtn.addEventListener('click', () => {
        try {
          const canvas = scene.querySelector('canvas'); if (!canvas) throw new Error('No canvas');
          const finalCanvas = document.createElement('canvas'); finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
          const ctx = finalCanvas.getContext('2d'); ctx.fillStyle = '#000'; ctx.fillRect(0,0,finalCanvas.width,finalCanvas.height); ctx.drawImage(canvas,0,0);
          finalCanvas.toBlob(blob => { if (!blob) return; const url = URL.createObjectURL(blob); const a = document.createElement('a'); const ts = new Date().toISOString().replace(/[:.]/g,'-'); const label = modelNames[lastDetectedMarker] || 'modelo'; a.download = `DinoAR-${label}-${ts}.png`; a.href = url; a.click(); URL.revokeObjectURL(url); }, 'image/png', 1.0);
        } catch (e) { console.error('Error al capturar', e); }
      });

      // adjust when AR.js video ready
      scene.addEventListener('arjs-video-loaded', () => {
        if (loading) loading.style.display = 'none';
        const arVideo = document.querySelector('video');
        if (arVideo) {
          arVideo.setAttribute('playsinline', ''); arVideo.style.position = 'fixed'; arVideo.style.top = '0'; arVideo.style.left = '0'; arVideo.style.width = '100vw'; arVideo.style.height = '100vh'; arVideo.style.objectFit = 'cover';
        }
        const camera = scene.querySelector('[camera]');
        if (camera) camera.setAttribute('fov', isMobile ? 70 : 60);
      });

    });
  </script>
</body>
</html>
