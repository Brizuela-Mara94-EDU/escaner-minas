<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Experiencia AR - Dinos (Escáner)</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.4/aframe/build/aframe-ar.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial;
      background:#000;color:#fff;position:fixed;width:100%;height:100%;overflow:hidden;
    }
    /* Overlay de pre-escaneo */
    .overlay{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 20%,transparent 80%,rgba(0,0,0,.7) 100%);pointer-events:none;z-index:10}
    .header{position:fixed;top:0;left:0;width:100%;padding:20px;display:flex;justify-content:space-between;align-items:center;z-index:20;background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent)}
    .close-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer}
    .scanner-frame{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:70vmin;height:70vmin;max-width:400px;max-height:400px;border:3px solid rgba(21,59,130,.6);border-radius:12px;z-index:15;pointer-events:none;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(21,59,130,.4)}50%{box-shadow:0 0 60px rgba(21,59,130,.7)}}
    .scan-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#4A90E2,transparent);animation:scan 2s linear infinite}
    @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(70vmin)}}

    /* Info flotante arriba */
    .model-info{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid rgba(21,59,130,.5);border-radius:10px;padding:12px 20px;z-index:20;text-align:center;backdrop-filter:blur(10px);opacity:0;transition:opacity .3s}
    .model-info.active{opacity:1}
    .model-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
    .model-subtitle{font-size:12px;color:#4A90E2;letter-spacing:1px}

    /* Panel inferior con acciones */
    #dino-info-panel{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid rgba(74,144,226,.4);border-radius:12px;padding:12px 14px;z-index:30;display:none;max-width:calc(100vw - 32px);backdrop-filter:blur(8px)}
    #dino-info-panel button{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
    #restart-button{position:fixed;right:16px;bottom:24px;z-index:30;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:22px;cursor:pointer;display:none}

    /* Hints */
    #control-hints{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;color:#fff;font-size:14px;background:rgba(0,0,0,.6);padding:6px 14px;border-radius:8px;opacity:0;transition:opacity .4s;z-index:25}
    #control-hints.visible{opacity:1}

    /* Fullscreen del video/canvas */
    #arjs-video{position:fixed!important;top:0!important;left:0!important;width:100%!important;height:100%!important;z-index:-1!important}
    .a-canvas{position:fixed!important;top:0!important;left:0!important;width:100%!important;height:100%!important;z-index:0!important}
    a-scene{width:100%!important;height:100%!important}
    @media(max-width:768px){.a-canvas{object-fit:contain!important}}
  </style>
</head>
<body>
  <!-- UI de pre-escaneo -->
  <div class="overlay" id="preOverlay"></div>
  <div class="header" id="preHeader">
    <div style="font-weight:700;font-size:18px;">Experiencia AR</div>
    <button class="close-btn" id="closeBtn" title="Cerrar">✕</button>
  </div>
  <div class="scanner-frame" id="scannerBox"><div class="scan-line"></div></div>

  <!-- Escena AR (misma config que el escáner estable) -->
  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    arjs="
      sourceType: webcam;
      facingMode: environment;
      detectionMode: mono_and_matrix;
      matrixCodeType: 3x3;
      debugUIEnabled: false;
      maxDetectionRate: 15;
      minConfidence: 0.05;
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;
    "
    renderer="logarithmicDepthBuffer: true; precision: mediump; antialias: true;"
  >
    <!-- Marcadores con TUS modelos (mismas escalas/posiciones) -->
    <a-marker id="marker0" type="barcode" value="0" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-entity id="model0"
        gltf-model="/AppMindAr/models/brachiosaurus.glb"
        scale="0.065 0.065 0.05"
        position="0 -0.62 -1.75"
        rotation="0 300 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker1" type="barcode" value="1" emitevents="true" smooth="true" smoothCount="3" smoothTolerance="0.005" smoothThreshold="1">
      <a-entity id="model1"
        gltf-model="/AppMindAr/models/trex.glb"
        scale="0.15 0.15 0.15"
        position="0 -0.4 -1.7"
        rotation="0 90 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker2" type="barcode" value="2" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-entity id="model2"
        gltf-model="/AppMindAr/models/triceratops.glb"
        scale="1 1 0.75"
        position="0 -0.1 -1.5"
        rotation="0 45 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker3" type="barcode" value="3" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-entity id="model3"
        gltf-model="/AppMindAr/models/velociraptor.glb"
        scale="0.35 0.35 0.35"
        position="0 -0.3 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker4" type="barcode" value="4" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-entity id="model4"
        gltf-model="/AppMindAr/models/stegosaurio.glb"
        scale="0.2 0.2 0.2"
        position="0 -0.1 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker5" type="barcode" value="5" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-entity id="model5"
        gltf-model="/AppMindAr/models/ankylosaurus.glb"
        scale="0.02 0.02 0.02"
        position="0 -0.1 -1.5"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- Info superior -->
  <div class="model-info" id="modelInfo">
    <div class="model-name" id="modelName">Dinosaurio</div>
    <div class="model-subtitle" id="modelSubtitle">Barcode AR</div>
  </div>

  <!-- Panel inferior -->
  <div id="dino-info-panel">
    <div id="dino-title" style="font-weight:700">Dino</div>
    <div id="dino-desc" style="font-size:12px;opacity:.9">Descripción</div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button id="play-sound-btn">🔊 Sonido</button>
      <button id="take-photo-btn">📸 Foto</button>
      <button id="close-info-btn">✕</button>
    </div>
  </div>
  <button id="restart-button" title="Reescanear">🔄</button>
  <div id="control-hints">🖐 Arrastra para girar · 📱 Pellizca para zoom</div>

  <script>
    // --------- Estado y referencias ----------
    const scene = document.getElementById('scene');
    const preOverlay = document.getElementById('preOverlay');
    const preHeader  = document.getElementById('preHeader');
    const scannerBox = document.getElementById('scannerBox');

    const infoBox = document.getElementById('modelInfo');
    const nameEl  = document.getElementById('modelName');
    const subEl   = document.getElementById('modelSubtitle');

    const dinoPanel = document.getElementById('dino-info-panel');
    const dinoTitle = document.getElementById('dino-title');
    const dinoDesc  = document.getElementById('dino-desc');

    const btnClose   = document.getElementById('close-info-btn');
    const btnSound   = document.getElementById('play-sound-btn');
    const btnPhoto   = document.getElementById('take-photo-btn');
    const btnRestart = document.getElementById('restart-button');
    const hints      = document.getElementById('control-hints');

    const roarAudio = new Audio('/AppMindAr/sounds/roar.mp3');
    const isMobile  = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // Datos de nombres/descripciones (idénticos a los tuyos)
    const modelInfo = {
      0:{emoji:"🦕",name:"Brachiosaurus",desc:"Gigante herbívoro de cuello largo."},
      1:{emoji:"🦖",name:"Tyrannosaurus Rex",desc:"El rey de los depredadores."},
      2:{emoji:"🦏",name:"Triceratops",desc:"Herbívoro con tres cuernos."},
      3:{emoji:"🦎",name:"Velociraptor",desc:"Cazador inteligente y ágil."},
      4:{emoji:"🦕",name:"Stegosaurio",desc:"Herbívoro jurásico con placas óseas."},
      5:{emoji:"🛡️",name:"Anquilosaurio",desc:"El tanque viviente del Cretácico."}
    };

    // Bloqueo de único dino
    let lockedMarker = null;
    let currentModel = null;

    // --------- Ajustes de video/FOV al cargar ----------
    document.getElementById('closeBtn').addEventListener('click',()=>window.history.back());

    scene.addEventListener('arjs-video-loaded', ()=>{
      const vid = document.querySelector('video');
      const cvs = document.querySelector('.a-canvas');
      if (vid){
        vid.setAttribute('playsinline','');
        Object.assign(vid.style,{position:'fixed',top:'0',left:'0',width:'100vw',height:'100vh',objectFit:'cover',zIndex:-1});
      }
      if (cvs){
        Object.assign(cvs.style,{position:'fixed',top:'0',left:'0',width:'100vw',height:'100vh'});
      }
      if (scene.camera){
        scene.camera.fov = isMobile ? 72 : 60;
        scene.camera.updateProjectionMatrix();
      }
    });

    // --------- Utilidades UI ----------
    function hidePreScanUI(){
      preOverlay.style.display='none';
      preHeader.style.display='none';
      scannerBox.style.display='none';
    }
    function showPreScanUI(){
      preOverlay.style.display='';
      preHeader.style.display='';
      scannerBox.style.display='';
    }
    function showHints(){
      hints.classList.add('visible');
      setTimeout(()=>hints.classList.remove('visible'), 5000);
    }

    // --------- Eventos de marcadores (0–5) ----------
    [0,1,2,3,4,5].forEach(i=>{
      const marker = document.getElementById('marker'+i);
      const model  = document.getElementById('model'+i);
      if (!marker || !model) return;

      marker.addEventListener('markerFound', ()=>{
        // Si ya hay uno bloqueado y no es éste, ignorar
        if (lockedMarker!==null && lockedMarker!==i) return;

        // Bloquear este marcador si aún no
        if (lockedMarker===null){
          lockedMarker = i;
          currentModel = model;
          hidePreScanUI();                 // ocultar marco/overlay
          btnRestart.style.display='block';
          dinoPanel.style.display='block';
          showHints();

          // Mostrar info usando tabla
          const inf = modelInfo[i];
          if (inf){
            nameEl.textContent = `${inf.emoji} ${inf.name}`;
            subEl.textContent  = inf.desc;
            infoBox.classList.add('active');

            dinoTitle.textContent = `${inf.emoji} ${inf.name}`;
            dinoDesc.textContent  = inf.desc;
          }

          // Sonido
          try{roarAudio.currentTime=0;roarAudio.play().catch(()=>{});}catch{}
        } else {
          // Si ya está bloqueado a este mismo, sólo asegurar que la info siga visible
          infoBox.classList.add('active');
        }
      });

      marker.addEventListener('markerLost', ()=>{
        // Si se pierde el marcador bloqueado, mantenemos UI pero sin “parpadeo”
        // La lógica de bloqueo evita sumar otros modelos.
        infoBox.classList.remove('active');
      });
    });

    // --------- Controles: sonido, cerrar panel, foto ----------
    btnSound.onclick = ()=>{
      try{roarAudio.currentTime=0;roarAudio.play().catch(()=>{});}catch{}
    };

    btnClose.onclick = ()=>{
      dinoPanel.style.display='none';
    };

    // Foto (descarga PNG)
    btnPhoto.onclick = ()=>{
      if (!scene.components || !scene.components.screenshot){
        scene.setAttribute('screenshot','width:1920;height:1080');
      }
      const canvas = scene.components.screenshot?.getCanvas('perspective');
      if (!canvas){ alert('⚠️ No se pudo capturar la imagen.'); return; }
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'captura_dino.png';
      document.body.appendChild(a); a.click(); a.remove();
    };

    // --------- Reescanear (reset limpio) ----------
    btnRestart.onclick = ()=>{
      // Reset de bloqueo
      lockedMarker = null;
      currentModel = null;

      // Restaurar UI de pre-escaneo
      showPreScanUI();
      btnRestart.style.display='none';
      dinoPanel.style.display='none';
      infoBox.classList.remove('active');

      // Parar sonido
      try{roarAudio.pause();}catch{}

      // Opcional: restaurar rotación/escala a valores originales
      resetTransforms();
    };

    // --------- Rotar/Zoom sobre el modelo bloqueado ----------
    let isRotating=false,lastX=0,lastY=0,rotY=0,rotX=0,velY=0,velX=0,scale=1,pinch=0,baseScale=1,touches=[];

    function getM(){ return currentModel; }
    function setScaleUniform(entity, s){
      const base = entity.getAttribute('scale');
      // Si el modelo tiene escala no uniforme, aplicamos factor relativo
      const parts = (typeof base==='string'? base : `${base.x} ${base.y} ${base.z}`).split(' ').map(parseFloat);
      entity.setAttribute('scale', `${parts[0]*s} ${parts[1]*s} ${parts[2]*s}`);
    }
    function updateTransform(){
      const m = getM(); if(!m) return;
      m.setAttribute('rotation', `${rotX} ${rotY} 0`);
      setScaleUniform(m, scale);
    }
    function inertia(){
      const m = getM();
      if (m && !isRotating){
        velY*=0.95; velX*=0.95;
        if (Math.abs(velY)>0.1 || Math.abs(velX)>0.1){
          rotY+=velY; rotX-=velX; rotX=Math.max(-45,Math.min(45,rotX));
          updateTransform();
        }
      }
      requestAnimationFrame(inertia);
    }
    inertia();

    function dist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }

    document.addEventListener('touchstart', e=>{
      if(!currentModel) return;
      touches = [...e.touches];
      if (touches.length===1){
        isRotating=true; lastX=touches[0].clientX; lastY=touches[0].clientY; velX=velY=0;
      } else if (touches.length===2){
        e.preventDefault(); pinch=dist(touches); baseScale=scale;
      }
    }, {passive:false});

    document.addEventListener('touchmove', e=>{
      if(!currentModel) return;
      touches = [...e.touches];
      if (touches.length===1 && isRotating){
        const dx=touches[0].clientX-lastX, dy=touches[0].clientY-lastY;
        velY=dx*0.5; velX=dy*0.3;
        rotY+=velY; rotX-=velX; rotX=Math.max(-45,Math.min(45,rotX));
        updateTransform(); lastX=touches[0].clientX; lastY=touches[0].clientY;
      } else if (touches.length===2){
        e.preventDefault();
        const p=dist(touches), ch=p/pinch;
        scale=Math.max(0.3, Math.min(2.5, baseScale*ch));
        updateTransform();
      }
    }, {passive:false});

    document.addEventListener('touchend', e=>{
      if (e.touches.length===0) isRotating=false;
      if (e.touches.length<2)   pinch=0;
    });

    document.addEventListener('mousedown', e=>{
      if(!currentModel || e.target.closest('button')) return;
      isRotating=true; lastX=e.clientX; lastY=e.clientY; e.preventDefault();
    });
    document.addEventListener('mousemove', e=>{
      if(!isRotating) return;
      const m=getM(); if(!m) return;
      const dx=e.clientX-lastX, dy=e.clientY-lastY;
      velY=dx*0.5; velX=dy*0.3;
      rotY+=velY; rotX-=velX; rotX=Math.max(-45,Math.min(45,rotX));
      updateTransform(); lastX=e.clientX; lastY=e.clientY;
    });
    document.addEventListener('mouseup', ()=> isRotating=false);

    document.addEventListener('wheel', e=>{
      if(!currentModel) return;
      e.preventDefault();
      const d=e.deltaY * -0.001;
      scale = Math.max(0.3, Math.min(2.5, scale + d));
      updateTransform();
    }, {passive:false});

    // Restaurar transform a “default” del modelo (al reescanear)
    function resetTransforms(){
      rotX=0; rotY=0; scale=1;
      if (currentModel) updateTransform();
      // También restauramos escalas originales declaradas en cada entity (quedan como están en el DOM)
      // Como manipulamos multiplicando, con scale=1 volvemos al “base-scale” visual.
    }
  </script>
</body>
</html>
