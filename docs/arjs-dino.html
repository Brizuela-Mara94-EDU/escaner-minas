<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiencia AR - Dinos</title>
  <link rel="stylesheet" href="/AppMindAr/style.css" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <!-- UI de escaneo -->
  <div id="scanning-ui" class="ui-layer">
    <div class="projection-box"><div></div></div>
    <div class="search-text">Apunta al centro de un marcador...</div>
  </div>

  <!-- Panel de información -->
  <div id="dino-info-panel" class="hidden">
    <div class="info-content">
      <h3 id="dino-name">Nombre del Modelo</h3>
      <p id="dino-description">Descripción...</p>
      <div class="interaction-buttons">
        <button id="play-sound-btn">🔊 Sonido</button>
        <button id="take-photo-btn">📸 Foto</button>
      </div>
    </div>
    <button id="close-info-btn">✕</button>
  </div>

  <!-- Indicadores de control -->
  <div class="control-indicators hidden" id="control-indicators">
    <div class="control-hint">
      <span id="rotate-hint">Arrastra para girar</span>
    </div>
    <div class="control-hint">
      <span id="zoom-hint">Pellizca para zoom</span>
    </div>
  </div>

  <!-- Botón de reescanear -->
  <button id="restart-button" class="hidden">🔄 Reescanear</button>

  <!-- Estado -->
  <div id="detection-status" class="detection-status">Buscando marcador...</div>

  <!-- 🔹 Escena AR fija (igual que el escáner, pero para dinos) -->
  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: mediump; antialias: true;"
    arjs="sourceType: webcam; facingMode: environment; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false; maxDetectionRate: 15; minConfidence: 0.05; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;"
  >
    <a-assets>
      <a-asset-item id="brachiosaurus" src="/AppMindAr/models/brachiosaurus.glb"></a-asset-item>
      <a-asset-item id="trex" src="/AppMindAr/models/trex.glb"></a-asset-item>
      <a-asset-item id="triceratops" src="/AppMindAr/models/triceratops.glb"></a-asset-item>
      <a-asset-item id="velociraptor" src="/AppMindAr/models/velociraptor.glb"></a-asset-item>
      <a-asset-item id="stegosaurio" src="/AppMindAr/models/stegosaurio.glb"></a-asset-item>
      <a-asset-item id="ankylosaurio" src="/AppMindAr/models/ankylosaurus.glb"></a-asset-item>
    </a-assets>

    <!-- Marcadores -->
    <a-marker id="marker0" type="barcode" value="0"></a-marker>
    <a-marker id="marker1" type="barcode" value="1"></a-marker>
    <a-marker id="marker2" type="barcode" value="2"></a-marker>
    <a-marker id="marker3" type="barcode" value="3"></a-marker>
    <a-marker id="marker4" type="barcode" value="4"></a-marker>
    <a-marker id="marker5" type="barcode" value="5"></a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const modelInfo = {
      0: { name: "Brachiosaurus", emoji: "🦕", description: "Gigante herbívoro de cuello largo.", scale: "0.065 0.065 0.05", scaleMobile: "0.05 0.05 0.04", position: "0 -0.62 -1.75", rotation: "0 300 0" },
      1: { name: "Tyrannosaurus Rex", emoji: "🦖", description: "El rey de los depredadores.", scale: "0.15 0.15 0.15", scaleMobile: "0.1 0.1 0.1", position: "0 -0.4 -1.7", rotation: "0 90 0" },
      2: { name: "Triceratops", emoji: "🦏", description: "Herbívoro con tres cuernos.", scale: "1 1 0.75", scaleMobile: "0.4 0.4 0.4", position: "0 -0.1 -1.5", rotation: "0 45 0" },
      3: { name: "Velociraptor", emoji: "🦎", description: "Cazador inteligente y ágil.", scale: "0.35 0.35 0.35", scaleMobile: "0.15 0.15 0.15", position: "0 -0.3 -1.5", rotation: "0 0 0" },
      4: { name: "Stegosaurio", emoji: "🦕", description: "Herbívoro del Jurásico con placas óseas.", scale: "0.2 0.2 0.2", scaleMobile: "0.1 0.1 0.1", position: "0 -0.1 -1.5", rotation: "0 0 0" },
      5: { name: "Anquilosaurio", emoji: "🛡️", description: "El 'tanque viviente' del Cretácico.", scale: "0.02 0.02 0.02", scaleMobile: "0.0022 0.0022 0.0022", position: "0 -0.1 -1.5", rotation: "0 0 0" }
    };

    const roarAudio = new Audio("/AppMindAr/sounds/roar.mp3");
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

    let isModelPlaced = false;
    let currentModel = null;
    const detectionStatus = document.querySelector("#detection-status");
    const restartButton = document.querySelector("#restart-button");
    const infoPanel = document.querySelector("#dino-info-panel");
    const playSoundButton = document.querySelector("#play-sound-btn");
    const closeInfoButton = document.querySelector("#close-info-btn");
    const controlIndicators = document.querySelector("#control-indicators");

    const scene = document.querySelector("#scene");
    const scanningUI = document.querySelector("#scanning-ui");

    scene.addEventListener("loaded", () => {
      const markers = scene.querySelectorAll("a-marker");

      markers.forEach(marker => {
        marker.addEventListener("markerFound", () => handleMarkerFound(marker));
        marker.addEventListener("markerLost", () => console.log("🔹 Marcador perdido"));
      });
    });

    function handleMarkerFound(marker) {
      if (isModelPlaced) return;

      const index = marker.getAttribute("value");
      const config = modelInfo[index];
      if (!config) return;

      const scale = isMobile ? config.scaleMobile : config.scale;
      const model = document.createElement("a-entity");
      model.setAttribute("gltf-model", `#${getModelId(index)}`);
      model.setAttribute("scale", scale);
      model.setAttribute("rotation", config.rotation);
      model.setAttribute("position", config.position);
      model.setAttribute("animation-mixer", "");

      marker.appendChild(model);
      currentModel = model;
      isModelPlaced = true;

      scanningUI.classList.add("hidden");
      restartButton.classList.remove("hidden");
      detectionStatus.textContent = `🦖 ${config.name} detectado`;
      showInfo(config);
      playRoar();
      setupControls(model);
    }

    function getModelId(i) {
      return ["brachiosaurus","trex","triceratops","velociraptor","stegosaurio","ankylosaurio"][i];
    }

    function showInfo(info) {
      document.querySelector("#dino-name").textContent = `${info.emoji} ${info.name}`;
      document.querySelector("#dino-description").textContent = info.description;
      infoPanel.classList.remove("hidden");
    }

    function playRoar() {
      roarAudio.currentTime = 0;
      roarAudio.play().catch(()=>{});
    }

    playSoundButton.addEventListener("click", playRoar);
    closeInfoButton.addEventListener("click", () => infoPanel.classList.add("hidden"));

    restartButton.addEventListener("click", () => {
      const placed = document.querySelectorAll(".a-marker a-entity[gltf-model]");
      placed.forEach(p => p.parentNode.removeChild(p));
      roarAudio.pause();
      isModelPlaced = false;
      currentModel = null;
      scanningUI.classList.remove("hidden");
      restartButton.classList.add("hidden");
      detectionStatus.textContent = "Buscando marcador...";
    });

    // Controles táctiles y zoom
    let isRotating = false, lastX = 0, lastY = 0, currentRotationY = 0, currentRotationX = 0, currentScale = 1;
    document.addEventListener("touchstart", e => handleTouchStart(e), { passive: false });
    document.addEventListener("touchmove", e => handleTouchMove(e), { passive: false });
    document.addEventListener("touchend", () => isRotating = false);

    function handleTouchStart(e) {
      if (!currentModel) return;
      if (e.touches.length === 1) {
        isRotating = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        e.preventDefault();
        initialDistance = getDistance(e.touches);
      }
    }

    function handleTouchMove(e) {
      if (!currentModel) return;
      if (e.touches.length === 1 && isRotating) {
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        currentRotationY += dx * 0.5;
        currentRotationX += dy * 0.3;
        currentModel.setAttribute("rotation", `${currentRotationX} ${currentRotationY} 0`);
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        e.preventDefault();
        const newDist = getDistance(e.touches);
        const scaleChange = newDist / initialDistance;
        currentScale = Math.max(0.3, Math.min(2.5, scaleChange));
        currentModel.setAttribute("scale", applyScale(currentModel, currentScale));
      }
    }

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function applyScale(model, factor) {
      const base = model.getAttribute("scale");
      const s = base.split(" ").map(v => parseFloat(v) * factor);
      return s.join(" ");
    }

    function setupControls() {
      controlIndicators.classList.remove("hidden");
      setTimeout(() => controlIndicators.classList.add("hidden"), 4000);
    }
  </script>
</body>
</html>
