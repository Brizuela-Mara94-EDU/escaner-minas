<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Experiencia AR - Dinos (Escáner)</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.4/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui; background: #000; color: #fff; position: fixed; width: 100%; height: 100%; overflow: hidden; }

    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 10;
    }
    .header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
    .close-btn {
      width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 20px; cursor: pointer;
    }
    .scanner-frame {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 70vmin; height: 70vmin; border: 3px solid rgba(21,59,130,0.6); border-radius: 12px;
      z-index: 15; pointer-events: none; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 40px rgba(21,59,130,0.4);} 50%{box-shadow:0 0 60px rgba(21,59,130,0.7);} }
    .scan-line {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, #4A90E2, transparent);
      animation: scan 2s linear infinite;
    }
    @keyframes scan { 0%{transform:translateY(0);} 100%{transform:translateY(70vmin);} }

    .model-info {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); border: 1px solid rgba(21,59,130,0.5);
      border-radius: 10px; padding: 12px 20px; z-index: 20; text-align: center;
      backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s;
    }
    .model-info.active { opacity: 1; }
    .model-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .model-subtitle { font-size: 12px; color: #4A90E2; letter-spacing: 1px; }

    /* Panel inferior */
    #dino-info-panel {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid rgba(74,144,226,0.4);
      border-radius: 12px; padding: 12px 14px; z-index: 30;
      display: none; max-width: calc(100vw - 32px); backdrop-filter: blur(8px);
    }
    #dino-info-panel button {
      padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: #fff; cursor: pointer;
    }
    #restart-button {
      position: fixed; right: 16px; bottom: 24px; z-index: 30;
      width: 52px; height: 52px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08); color: #fff; font-size: 22px; cursor: pointer; display: none;
    }

    /* Hints visuales */
    #control-hints {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      text-align: center; color: #fff; font-size: 14px;
      background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 8px;
      opacity: 0; transition: opacity 0.4s; z-index: 25;
    }
    #control-hints.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="header">
    <div style="font-weight:700; font-size:18px;">Experiencia AR</div>
    <button class="close-btn" id="closeBtn">✕</button>
  </div>
  <div class="scanner-frame"><div class="scan-line"></div></div>

  <!-- Escena -->
  <a-scene id="scene" embedded vr-mode-ui="enabled:false"
    arjs="sourceType: webcam; facingMode: environment; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false; maxDetectionRate: 15; minConfidence: 0.05; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;"
    renderer="logarithmicDepthBuffer: true; precision: mediump; antialias: true;">
    <a-marker id="marker0" type="barcode" value="0"><a-entity id="model0" gltf-model="/AppMindAr/models/brachiosaurus.glb" scale="0.065 0.065 0.05" position="0 -0.62 -1.75" rotation="0 300 0"></a-entity></a-marker>
    <a-marker id="marker1" type="barcode" value="1"><a-entity id="model1" gltf-model="/AppMindAr/models/trex.glb" scale="0.15 0.15 0.15" position="0 -0.4 -1.7" rotation="0 90 0"></a-entity></a-marker>
    <a-marker id="marker2" type="barcode" value="2"><a-entity id="model2" gltf-model="/AppMindAr/models/triceratops.glb" scale="1 1 0.75" position="0 -0.1 -1.5" rotation="0 45 0"></a-entity></a-marker>
    <a-marker id="marker3" type="barcode" value="3"><a-entity id="model3" gltf-model="/AppMindAr/models/velociraptor.glb" scale="0.35 0.35 0.35" position="0 -0.3 -1.5"></a-entity></a-marker>
    <a-marker id="marker4" type="barcode" value="4"><a-entity id="model4" gltf-model="/AppMindAr/models/stegosaurio.glb" scale="0.2 0.2 0.2" position="0 -0.1 -1.5"></a-entity></a-marker>
    <a-marker id="marker5" type="barcode" value="5"><a-entity id="model5" gltf-model="/AppMindAr/models/ankylosaurus.glb" scale="0.02 0.02 0.02" position="0 -0.1 -1.5"></a-entity></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <div class="model-info" id="modelInfo"><div class="model-name" id="modelName">Dinosaurio</div><div class="model-subtitle" id="modelSubtitle">Barcode AR</div></div>

  <!-- Panel inferior -->
  <div id="dino-info-panel">
    <div id="dino-title" style="font-weight:700">Dino</div>
    <div id="dino-desc" style="font-size:12px;opacity:.9">Descripción</div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button id="play-sound-btn">🔊 Sonido</button>
      <button id="take-photo-btn">📸 Foto</button>
      <button id="close-info-btn">✕</button>
    </div>
  </div>
  <button id="restart-button">🔄</button>
  <div id="control-hints">🖐 Arrastra para girar<br>📱 Pellizca para zoom</div>

  <script>
  const roarAudio=new Audio('/AppMindAr/sounds/roar.mp3');
  const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
  const scene=document.getElementById('scene'),info=document.getElementById('modelInfo'),
        nameEl=document.getElementById('modelName'),subEl=document.getElementById('modelSubtitle'),
        dinoInfo=document.getElementById('dino-info-panel'),title=document.getElementById('dino-title'),
        desc=document.getElementById('dino-desc'),btnSound=document.getElementById('play-sound-btn'),
        btnPhoto=document.getElementById('take-photo-btn'),btnClose=document.getElementById('close-info-btn'),
        btnRestart=document.getElementById('restart-button'),hints=document.getElementById('control-hints');
  let lockedMarker=null,currentModel=null,infoVisible=false;

  const data={0:{emoji:"🦕",name:"Brachiosaurus",desc:"Gigante herbívoro de cuello largo."},1:{emoji:"🦖",name:"Tyrannosaurus Rex",desc:"El rey de los depredadores."},2:{emoji:"🦏",name:"Triceratops",desc:"Herbívoro con tres cuernos."},3:{emoji:"🦎",name:"Velociraptor",desc:"Cazador inteligente y ágil."},4:{emoji:"🦕",name:"Stegosaurio",desc:"Herbívoro jurásico con placas óseas."},5:{emoji:"🛡️",name:"Anquilosaurio",desc:"El tanque viviente del Cretácico."}};

  document.getElementById('closeBtn').addEventListener('click',()=>window.history.back());

  scene.addEventListener('arjs-video-loaded',()=>{
    const vid=document.querySelector('video');const cvs=document.querySelector('.a-canvas');
    if(vid){vid.setAttribute('playsinline','');Object.assign(vid.style,{position:'fixed',top:'0',left:'0',width:'100vw',height:'100vh',objectFit:'cover',zIndex:-1});}
    if(cvs)Object.assign(cvs.style,{position:'fixed',top:'0',left:'0',width:'100vw',height:'100vh'});
    if(scene.camera){scene.camera.fov=isMobile?72:60;scene.camera.updateProjectionMatrix();}
  });

  [0,1,2,3,4,5].forEach(i=>{
    const m=document.getElementById('marker'+i),e=document.getElementById('model'+i);
    if(!m||!e)return;
    m.addEventListener('markerFound',()=>{
      if(lockedMarker!==null&&lockedMarker!==i)return;
      if(lockedMarker===null)lockedMarker=i;
      const inf=data[i];
      nameEl.textContent=`${inf.emoji} ${inf.name}`;subEl.textContent=inf.desc;info.classList.add('active');
      title.textContent=`${inf.emoji} ${inf.name}`;desc.textContent=inf.desc;
      dinoInfo.style.display='block';infoVisible=true;btnRestart.style.display='block';
      currentModel=e;roarAudio.currentTime=0;roarAudio.play().catch(()=>{});
      showHints();
    });
    m.addEventListener('markerLost',()=>info.classList.remove('active'));
  });

  btnSound.onclick=()=>{roarAudio.currentTime=0;roarAudio.play().catch(()=>{});};
  btnClose.onclick=()=>{dinoInfo.style.display='none';infoVisible=false;};
  btnPhoto.onclick=()=>{
    const comp=scene.components&&scene.components.screenshot;
    if(!comp)scene.setAttribute('screenshot','width:1920;height:1080');
    const canvas=scene.components.screenshot?.getCanvas('perspective');
    if(!canvas){alert('⚠️ No se pudo capturar la imagen.');return;}
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='captura_dino.png';
    document.body.appendChild(a);a.click();a.remove();
  };
  btnRestart.onclick=()=>{
    lockedMarker=null;currentModel=null;dinoInfo.style.display='none';infoVisible=false;
    info.classList.remove('active');btnRestart.style.display='none';roarAudio.pause();
  };

  // --- Control táctil / mouse ---
  let isRotating=false,lastX=0,lastY=0,rotY=0,rotX=0,velY=0,velX=0,scale=1,pinch=0,baseScale=1,touches=[];
  const getM=()=>currentModel;
  function upd(){const m=getM();if(!m)return;m.setAttribute('rotation',`${rotX} ${rotY} 0`);m.setAttribute('scale',`${scale} ${scale} ${scale}`);}
  function inertia(){const m=getM();if(m&&!isRotating){velY*=0.95;velX*=0.95;if(Math.abs(velY)>0.1||Math.abs(velX)>0.1){rotY+=velY;rotX-=velX;rotX=Math.max(-45,Math.min(45,rotX));upd();}}requestAnimationFrame(inertia);}inertia();
  document.addEventListener('touchstart',e=>{if(!currentModel)return;touches=[...e.touches];if(touches.length===1){isRotating=true;lastX=touches[0].clientX;lastY=touches[0].clientY;velX=velY=0;}else if(touches.length===2){e.preventDefault();pinch=dist(touches);baseScale=scale;}},{passive:false});
  document.addEventListener('touchmove',e=>{if(!currentModel)return;touches=[...e.touches];if(touches.length===1&&isRotating){const dx=touches[0].clientX-lastX,dy=touches[0].clientY-lastY;velY=dx*0.5;velX=dy*0.3;rotY+=velY;rotX-=velX;rotX=Math.max(-45,Math.min(45,rotX));upd();lastX=touches[0].clientX;lastY=touches[0].clientY;}else if(touches.length===2){e.preventDefault();const p=dist(touches);const ch=p/pinch;scale=Math.max(0.3,Math.min(2.5,baseScale*ch));upd();}},{passive:false});
  document.addEventListener('touchend',e=>{if(e.touches.length===0)isRotating=false;if(e.touches.length<2)pinch=0;});
  document.addEventListener('mousedown',e=>{if(!currentModel||e.target.closest('button'))return;isRotating=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!isRotating)return;const m=getM();if(!m)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;velY=dx*0.5;velX=dy*0.3;rotY+=velY;rotX-=velX;rotX=Math.max(-45,Math.min(45,rotX));upd();lastX=e.clientX;lastY=e.clientY;});
  document.addEventListener('mouseup',()=>isRotating=false);
  document.addEventListener('wheel',e=>{if(!currentModel)return;e.preventDefault();const d=e.deltaY*-0.001;scale=Math.max(0.3,Math.min(2.5,scale+d));upd();},{passive:false});
  const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  btnRestart.addEventListener('click',()=>{scale=1;rotX=rotY=0;upd();});

  // --- Hints ---
  function showHints(){hints.classList.add('visible');setTimeout(()=>hints.classList.remove('visible'),5000);}
  </script>
</body>
</html>
