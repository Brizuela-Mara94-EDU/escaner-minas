<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>SIED - Escáner Bio AR</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial;
      background-color: #000; /* Fondo negro por si la cámara tarda */
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: fixed;
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 10;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }

    .header-logo {
      height: 100px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.3s ease;
    }

    .header-logo:hover {
      transform: scale(1.05);
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: rgba(119, 155, 44, 0.3);
      border-color: #779B2C;
    }

    .scanner-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vmin;
      height: 70vmin;
      max-width: 400px;
      max-height: 400px;
      border: 3px solid rgba(119,155,44,0.6);
      border-radius: 12px;
      z-index: 15;
      pointer-events: none;
      box-shadow: 0 0 40px rgba(119,155,44,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    .scanner-frame::before,
    .scanner-frame::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 4px solid #779B2C;
    }

    .scanner-frame::before {
      top: -4px;
      left: -4px;
      border-right: none;
      border-bottom: none;
    }

    .scanner-frame::after {
      bottom: -4px;
      right: -4px;
      border-left: none;
      border-top: none;
    }

    .corner-tl, .corner-tr {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 4px solid #779B2C;
      z-index: 16;
      pointer-events: none;
    }

    .corner-tl {
      top: -4px;
      right: -4px;
      border-left: none;
      border-bottom: none;
    }

    .corner-tr {
      bottom: -4px;
      left: -4px;
      border-right: none;
      border-top: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(119,155,44,0.4); }
      50% { box-shadow: 0 0 60px rgba(119,155,44,0.7); }
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #779B2C, transparent);
      animation: scan 2s linear infinite;
      z-index: 16;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(70vmin); }
    }

    .model-info {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(119,155,44,0.5);
      border-radius: 10px;
      padding: 16px 28px;
      z-index: 30;
      text-align: center;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .model-info.active {
      opacity: 1;
    }

    .model-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .model-subtitle {
      font-size: 12px;
      color: #779B2C;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(119,155,44,0.3);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(119,155,44,0.2);
      border-top-color: #779B2C;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .zoom-controls {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(119,155,44,0.4);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .zoom-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .zoom-btn:hover {
      background: rgba(119,155,44,0.3);
      border-color: #779B2C;
      transform: scale(1.05);
    }

    .zoom-btn:active {
      transform: scale(0.95);
    }

    .zoom-indicator {
      padding: 8px 12px;
      background: rgba(119,155,44,0.2);
      border-radius: 6px;
      color: #779B2C;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      border: 1px solid rgba(119,155,44,0.3);
      min-width: 60px;
    }

    .rotation-controls {
      position: fixed;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 8px;
      z-index: 20;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(119,155,44,0.4);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .rotation-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .rotation-btn:hover {
      background: rgba(119,155,44,0.3);
      border-color: #779B2C;
      transform: scale(1.05);
    }

    .rotation-btn:active {
      background: rgba(119,155,44,0.5);
      transform: scale(0.95);
    }

    #rotateUp {
      grid-column: 2;
      grid-row: 1;
    }

    #rotateLeft {
      grid-column: 1;
      grid-row: 2;
    }

    #rotateReset {
      grid-column: 2;
      grid-row: 2;
      font-size: 24px;
    }

    #rotateRight {
      grid-column: 3;
      grid-row: 2;
    }

    #rotateDown {
      grid-column: 2;
      grid-row: 3;
    }

    .capture-btn-integrated {
      margin-top: 8px;
      background: rgba(119,155,44,0.2) !important;
      border-color: rgba(119,155,44,0.4) !important;
      font-size: 20px;
    }

    .capture-btn-integrated:hover {
      background: rgba(119,155,44,0.4) !important;
      border-color: #779B2C !important;
    }

    .capture-btn-integrated.capturing {
      background: rgba(255,165,0,0.3) !important;
      border-color: #ffa500 !important;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }

    .capture-btn-integrated.captured {
      background: rgba(0,200,0,0.4) !important;
      border-color: #00c800 !important;
      pointer-events: none;
    }

    .capture-btn-integrated.error {
      background: rgba(200,0,0,0.4) !important;
      border-color: #c80000 !important;
      pointer-events: none;
    }

    .capture-btn-mobile {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(119,155,44,0.9);
      border: 3px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(119,155,44,0.4);
    }

    .capture-btn-mobile:active {
      transform: scale(0.9);
    }

    .capture-btn-mobile.capturing {
      background: rgba(255,165,0,0.9);
      border-color: #ffa500;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }

    .capture-btn-mobile.captured {
      background: rgba(0,200,0,0.9);
      border-color: #00c800;
      pointer-events: none;
    }

    .capture-btn-mobile.error {
      background: rgba(200,0,0,0.9);
      border-color: #c80000;
      pointer-events: none;
    }

    .reset-scan-btn {
      position: fixed;
      bottom: 100px;
      left: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      background: rgba(119,155,44,0.9);
      border: 2px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(119,155,44,0.4);
    }

    .reset-scan-btn.visible {
      display: flex;
    }

    .reset-scan-btn:hover {
      background: rgba(119,155,44,1);
      border-color: #fff;
      transform: scale(1.05);
    }

    .reset-scan-btn:active {
      transform: scale(0.95);
    }

    .mobile-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(119,155,44,0.4);
      border-radius: 8px;
      padding: 10px 20px;
      z-index: 20;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.5s ease-out;
      font-size: 12px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @media (max-width: 768px) {
      .scanner-frame {
        width: 80vmin;
        height: 80vmin;
      }
      .header {
        padding: 20px;
      }
      .header-logo {
        height: 40px;
      }
      .zoom-controls, .rotation-controls {
        display: none;
      }
      .capture-btn-mobile {
        bottom: 90px;
        right: 16px;
        width: 56px;
        height: 56px;
        font-size: 26px;
      }
    }

    @media (min-width: 1025px) {
      .capture-btn-mobile {
        display: none;
      }
    }

    @media (max-width: 1024px) {
      .zoom-controls, .rotation-controls {
        display: none;
      }
      .capture-btn-integrated {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .reset-scan-btn {
        bottom: 90px;
        left: 16px;
        padding: 10px 20px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .capture-btn-mobile {
        bottom: 80px;
        right: 12px;
        width: 52px;
        height: 52px;
        font-size: 24px;
      }
      .reset-scan-btn {
        bottom: 80px;
        left: 12px;
        padding: 8px 16px;
        font-size: 12px;
      }
    }

    @media (orientation: landscape) and (max-width: 1024px) {
      .model-info {
        top: auto;
        bottom: 170px;
        left: 20px;
        right: auto;
        transform: none;
        text-align: left;
        padding: 12px 16px;
        border-radius: 8px;
        min-width: 160px;
        max-width: 42vw;
        box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      }

      .reset-scan-btn {
        bottom: 100px;
        left: 20px;
        z-index: 20;
      }
    }

    video,
    #arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: -2 !important;
      margin: 0 !important;
    }

    .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: -1 !important;
    }

    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 0 !important;
    }

    @media (max-width: 768px) {
      .a-canvas {
        object-fit: contain !important;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="header">
    <img src="/AppMindAr/assets/LOGO%20SIED%20SOLO-01-BluIfg0u.png" class="header-logo" alt="SIED Logo">
    <button class="close-btn" id="closeBtn" title="Cerrar">✕</button>
  </div>

  <div class="scanner-frame">
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="scan-line"></div>
  </div>

  <div class="mobile-hint" id="mobileHint" style="display:none;">
    <div style="font-size: 11px; opacity: 0.8; margin-bottom: 4px;">CONTROLES:</div>
    <div style="font-size: 12px;">🖐️ 1 dedo: Rotar | 🤏 2 dedos: Zoom</div>
  </div>

  <div class="model-info" id="modelInfo">
    <div class="model-name" id="modelName">Modelo Bio</div>
    <div class="model-subtitle">Bio AR - Modelo 3D</div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color: #779B2C; font-size: 14px; font-weight: 600;">Iniciando Bio AR...</div>
  </div>

  <div class="zoom-controls" id="zoomControls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <div class="zoom-indicator" id="zoomLevel">1.0x</div>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn capture-btn-integrated" id="captureBtn" title="Capturar foto">📷</button>
  </div>

  <div class="rotation-controls" id="rotationControls">
    <button class="rotation-btn" id="rotateUp">↑</button>
    <button class="rotation-btn" id="rotateLeft">←</button>
    <button class="rotation-btn" id="rotateReset">⟲</button>
    <button class="rotation-btn" id="rotateRight">→</button>
    <button class="rotation-btn" id="rotateDown">↓</button>
  </div>

  <button class="capture-btn-mobile" id="captureBtnMobile" title="Capturar foto">📷</button>

  <button class="reset-scan-btn" id="resetScanBtn">
    <span>🔄</span>
    <span>Escanear otro</span>
  </button>

  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    arjs="
      sourceType: webcam;
      facingMode: environment;
      detectionMode: mono_and_matrix;
      matrixCodeType: 3x3;
      debugUIEnabled: false;
      maxDetectionRate: 30;
      minConfidence: 0.5;
      sourceWidth: 640;
      sourceHeight: 480;
      displayWidth: 640;
      displayHeight: 480;
    "
    renderer="logarithmicDepthBuffer: true; precision: mediump; antialias: true;"
  >
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 1 1" intensity="1.5"></a-light>

    <!-- ✅ Marcadores BIO: 6–11 -->
    <a-marker id="marker6" type="barcode" value="6">
      <a-entity 
        id="model6"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker7" type="barcode" value="7">
      <a-entity 
        id="model7"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker8" type="barcode" value="8">
      <a-entity 
        id="model8"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker9" type="barcode" value="9">
      <a-entity 
        id="model9"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker10" type="barcode" value="10">
      <a-entity 
        id="model10"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-marker id="marker11" type="barcode" value="11">
      <a-entity 
        id="model11"
        class="ar-model"
        gltf-model=""
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="-90 0 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ----- CONFIGURACIÓN DE MODELOS BIO -----
    window.addEventListener('DOMContentLoaded', () => {
      const isProduction = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
      const BASE_PATH = isProduction ? '/AppMindAr' : '';

      for (let i of [6,7,8,9,10,11]) {
        const modelEntity = document.getElementById(`model${i}`);
        if (modelEntity) {
          modelEntity.setAttribute('gltf-model', `${BASE_PATH}/models/${getModelName(i)}.glb`);
        }
      }
    });

    function getModelName(id) {
      const names = {
        6: 'mariposa',
        7: 'helecho',
        8: 'cactus',
        9: 'saltamontes',
        10: 'arana',
        11: 'bosque'
      };
      return names[id] || 'mariposa';
    }

    // Estado global
    let currentModel = null;
    let currentScale = 0.5;
    let currentRotation = { x: -90, y: 0, z: 0 };
    let lastDetectedMarker = null;
    let persistentModel = null;
    let arSystem = null;
    let trackingPaused = false;

    const isProduction = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
    const BASE_PATH = isProduction ? '/AppMindAr' : '';

    // Configuración por modelo (ajustable después si lo querés retocar)
    const modelConfig = {
      6: { scale: 0.8, position: '0 0 -2', rotation: '0 0 0' },    // Mariposa
      7: { scale: 0.2, position: '0 -0.5 -3', rotation: '0 0 0' },  // Helecho
      8: { scale: 0.4, position: '0 -0.5 -3', rotation: '0 0 0' },  // Cactus
      9: { scale: 0.9, position: '0 -0.5 -3', rotation: '0 90 0' }, // Saltamontes
      10: { scale: 0.5, position: '0 -0.5 -3', rotation: '0 0 0' }, // Araña
      11: { scale: 0.02, position: '0 0 -4', rotation: '0 0 0' }    // Bosque (grande)
    };

    const modelNames = {
      6: 'Mariposa Cometa',
      7: 'Helecho',
      8: 'Cactus Opuntia',
      9: 'Saltamontes',
      10: 'Araña Lobo',
      11: 'Ecosistema Bosque'
    };

    const markerModels = {
      6: `${BASE_PATH}/models/mariposa.glb`,
      7: `${BASE_PATH}/models/helecho.glb`,
      8: `${BASE_PATH}/models/cactus.glb`,
      9: `${BASE_PATH}/models/saltamontes.glb`,
      10: `${BASE_PATH}/models/arania.glb`,
      11: `${BASE_PATH}/models/bosque.glb`
    };

    window.addEventListener('load', function () {
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading');
      const closeBtn = document.getElementById('closeBtn');
      const mobileHint = document.getElementById('mobileHint');
      const modelInfo = document.getElementById('modelInfo');
      const modelName = document.getElementById('modelName');
      const resetScanBtn = document.getElementById('resetScanBtn');

      const isMobile = ('ontouchstart' in window) && window.innerWidth <= 1024;

      if (isMobile && mobileHint) {
        setTimeout(() => {
          mobileHint.style.display = 'block';
          setTimeout(() => {
            mobileHint.style.opacity = '0';
            mobileHint.style.transition = 'opacity 1s';
            setTimeout(() => {
              mobileHint.style.display = 'none';
            }, 1000);
          }, 5000);
        }, 2000);
      }

      closeBtn.addEventListener('click', () => {
        window.history.back();
      });

      if (resetScanBtn) {
        resetScanBtn.addEventListener('click', () => {
          if (persistentModel && persistentModel.parentNode) {
            persistentModel.parentNode.removeChild(persistentModel);
          }

          persistentModel = null;
          currentModel = null;
          lastDetectedMarker = null;
          currentScale = 0.5;
          currentRotation = { x: -90, y: 0, z: 0 };
          trackingPaused = false;

          const sceneEl = document.querySelector('a-scene');
          const markerIds = [6,7,8,9,10,11];

          markerIds.forEach(id => {
            const existing = document.getElementById(`marker${id}`);
            if (existing) return;

            const newMarker = document.createElement('a-marker');
            newMarker.setAttribute('id', `marker${id}`);
            newMarker.setAttribute('type', 'barcode');
            newMarker.setAttribute('value', id);

            sceneEl.appendChild(newMarker);
            setupMarkerEvents(newMarker, id);
          });

          const video = document.querySelector('video');
          if (video) {
            video.style.opacity = '1';
          }

          const scannerFrame = document.querySelector('.scanner-frame');
          if (scannerFrame) {
            scannerFrame.style.opacity = '1';
          }

          document.body.style.backgroundColor = '#000';
          const aScene = document.querySelector('a-scene');
          if (aScene) {
            aScene.style.background = 'transparent';
          }

          modelInfo.classList.remove('active');
          resetScanBtn.classList.remove('visible');
          const zoomLevel = document.getElementById('zoomLevel');
          if (zoomLevel) zoomLevel.textContent = '1.0x';
        });
      }

      scene.addEventListener('loaded', function () {
        console.log('✅ Escena A-Frame cargada');
      });

      scene.addEventListener('arjs-video-loaded', function () {
        console.log('✅ AR.js: Video cargado');
        loading.style.display = 'none';

        arSystem = scene.systems.arjs || scene.systems['ar-js'];
      });

      setTimeout(function() {
        if (loading.style.display !== 'none') {
          loading.style.display = 'none';
        }
      }, 5000);

      function setupMarkerEvents(marker, i) {
        marker.addEventListener('markerFound', function() {
          if (trackingPaused) return;

          trackingPaused = true;
          lastDetectedMarker = i;

          const camera = scene.querySelector('[camera]');
          if (!camera) return;

          const config = modelConfig[i] || { scale: 0.5, position: '0 -0.5 -3', rotation: '-90 0 0' };
          currentScale = config.scale;
          const rotParts = config.rotation.split(' ').map(Number);
          currentRotation = { x: rotParts[0], y: rotParts[1], z: rotParts[2] };

          persistentModel = document.createElement('a-entity');
          persistentModel.setAttribute('gltf-model', markerModels[i]);
          persistentModel.setAttribute('position', config.position);
          persistentModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          persistentModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          persistentModel.setAttribute('animation-mixer', 'loop: repeat');

          const allMarkerIds = [6,7,8,9,10,11];
          allMarkerIds.forEach(markerId => {
            const markerEl = document.getElementById(`marker${markerId}`);
            if (markerEl) {
              markerEl.remove();
            }
          });

          setTimeout(() => {
            const video = document.querySelector('video');
            if (video) {
              video.style.opacity = '0';
              video.style.transition = 'opacity 0.5s ease';
            }
            const scannerFrame = document.querySelector('.scanner-frame');
            if (scannerFrame) {
              scannerFrame.style.opacity = '0';
              scannerFrame.style.transition = 'opacity 0.5s ease';
            }
            document.body.style.backgroundColor = '#000';
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl) sceneEl.style.background = '#000';
          }, 100);

          camera.appendChild(persistentModel);
          currentModel = persistentModel;

          modelName.textContent = modelNames[i] || 'Modelo Bio';
          modelInfo.classList.add('active');

          if (resetScanBtn) {
            resetScanBtn.classList.add('visible');
          }
        });

        marker.addEventListener('markerLost', function() {
          if (trackingPaused) return;
        });
      }

      const markerIds = [6,7,8,9,10,11];
      markerIds.forEach(i => {
        const marker = document.getElementById(`marker${i}`);
        if (!marker) return;
        setupMarkerEvents(marker, i);
      });

      const zoomIn = document.getElementById('zoomIn');
      const zoomOut = document.getElementById('zoomOut');
      const zoomLevel = document.getElementById('zoomLevel');

      if (zoomIn) {
        zoomIn.addEventListener('click', () => {
          if (!persistentModel && !currentModel) return;
          currentScale = Math.min(currentScale + 0.1, 3.0);
          const targetModel = persistentModel || currentModel;
          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
        });
      }

      if (zoomOut) {
        zoomOut.addEventListener('click', () => {
          if (!persistentModel && !currentModel) return;
          currentScale = Math.max(currentScale - 0.1, 0.1);
          const targetModel = persistentModel || currentModel;
          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
        });
      }

      const rotateUp = document.getElementById('rotateUp');
      const rotateDown = document.getElementById('rotateDown');
      const rotateLeft = document.getElementById('rotateLeft');
      const rotateRight = document.getElementById('rotateRight');
      const rotateReset = document.getElementById('rotateReset');

      if (rotateUp) {
        rotateUp.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.x += 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateDown) {
        rotateDown.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.x -= 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateLeft) {
        rotateLeft.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.y += 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateRight) {
        rotateRight.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          currentRotation.y -= 15;
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
        });
      }

      if (rotateReset) {
        rotateReset.addEventListener('click', () => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel || !lastDetectedMarker) return;

          const markerId = lastDetectedMarker;
          const config = modelConfig[markerId] || { scale: 0.5, position: '0 -0.5 -3', rotation: '-90 0 0' };

          currentScale = config.scale;
          const rotParts = config.rotation.split(' ').map(v => parseFloat(v));
          currentRotation = { x: rotParts[0], y: rotParts[1], z: rotParts[2] };

          targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          targetModel.setAttribute('position', config.position);

          if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
        });
      }

      const captureBtn = document.getElementById('captureBtn');
      const captureBtnMobile = document.getElementById('captureBtnMobile');

      if (captureBtn) captureBtn.addEventListener('click', captureScreenshot);
      if (captureBtnMobile) captureBtnMobile.addEventListener('click', captureScreenshot);

      function captureScreenshot() {
        const btn = isMobile ? captureBtnMobile : captureBtn;
        if (!btn) return;

        btn.classList.add('capturing');

        requestAnimationFrame(() => {
          try {
            const canvas = scene.querySelector('canvas');
            if (!canvas) {
              throw new Error('No se encontró el canvas');
            }

            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = canvas.width;
            finalCanvas.height = canvas.height;
            const ctx = finalCanvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            ctx.drawImage(canvas, 0, 0);

            finalCanvas.toBlob((blob) => {
              if (!blob) {
                throw new Error('Error al crear blob');
              }

              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
              const modelLabel = modelNames[lastDetectedMarker] || 'modelo';
              link.download = `Bio-AR-${modelLabel}-${timestamp}.png`;
              link.href = url;
              link.click();

              URL.revokeObjectURL(url);

              btn.classList.remove('capturing');
              btn.classList.add('captured');

              setTimeout(() => {
                btn.classList.remove('captured');
              }, 2000);
            }, 'image/png', 1.0);
          } catch (error) {
            console.error('❌ Error al capturar:', error);
            btn.classList.remove('capturing');
            btn.classList.add('error');

            setTimeout(() => {
              btn.classList.remove('error');
            }, 2000);
          }
        });
      }

      if (isMobile) {
        let touchStartDist = 0;
        let touchStartScale = currentScale;
        let touchStartRotY = 0;
        let lastTouchY = 0;

        scene.addEventListener('touchstart', (e) => {
          if (!currentModel && !persistentModel) return;

          if (e.touches.length === 2) {
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            touchStartDist = Math.sqrt(dx * dx + dy * dy);
            touchStartScale = currentScale;
          } else if (e.touches.length === 1) {
            touchStartRotY = currentRotation.y;
            lastTouchY = e.touches[0].pageY;
          }
        });

        scene.addEventListener('touchmove', (e) => {
          const targetModel = persistentModel || currentModel;
          if (!targetModel) return;
          e.preventDefault();

          if (e.touches.length === 2) {
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const scaleFactor = dist / touchStartDist;
            currentScale = Math.max(0.1, Math.min(3.0, touchStartScale * scaleFactor));
            targetModel.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
            if (zoomLevel) zoomLevel.textContent = `${currentScale.toFixed(1)}x`;
          } else if (e.touches.length === 1) {
            const deltaX = e.touches[0].pageX - window.innerWidth / 2;
            currentRotation.y = touchStartRotY + (deltaX * 0.5);

            const deltaY = e.touches[0].pageY - lastTouchY;
            currentRotation.x -= deltaY * 0.5;
            lastTouchY = e.touches[0].pageY;

            targetModel.setAttribute('rotation', `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
          }
        });
      }

      const sceneEl = document.querySelector('a-scene');

      sceneEl.addEventListener('arjs-video-loaded', () => {
        const arVideo = document.querySelector('video');
        const arCanvas = document.querySelector('.a-canvas');

        if (arVideo) {
          arVideo.setAttribute('playsinline', '');
          arVideo.style.position = 'fixed';
          arVideo.style.top = '0';
          arVideo.style.left = '0';
          arVideo.style.width = '100vw';
          arVideo.style.height = '100vh';
          arVideo.style.objectFit = 'cover';
        }

        if (arCanvas) {
          const updateCanvasSize = () => {
            const windowRatio = window.innerWidth / window.innerHeight;

            if (isMobile) {
              arCanvas.style.objectFit = 'contain';
              arCanvas.style.width = '100vw';
              arCanvas.style.height = '100vh';
            }
          };

          updateCanvasSize();
          window.addEventListener('resize', updateCanvasSize);
        }

        const camera = scene.querySelector('[camera]');
        if (camera) {
          const fov = isMobile ? 70 : 60;
          camera.setAttribute('fov', fov);
        }
      });

    });
  </script>
</body>
</html>
